<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>LUMEN - CORE V5.2.2</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const initTailwind = () => {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            fontFamily: {
                                sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                                mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                            },
                            animation: {
                                'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                                'fade-in': 'fadeIn 0.2s ease-out forwards',
                                'slide-in-right': 'slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                            }
                        }
                    }
                };
            }
        };
        if (typeof tailwind !== 'undefined') initTailwind();
        else { let attempts=0; const tInterval=setInterval(()=>{ if(typeof tailwind!=='undefined'){initTailwind(); clearInterval(tInterval);} if(++attempts>20)clearInterval(tInterval); },50); }
    </script>

    <!-- Markdown Support via Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>if(typeof marked!=='undefined') marked.setOptions({ breaks: true, gfm: true });</script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Dexie.js (IndexedDB) -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    
    <style type="text/tailwindcss">
        @layer components {
            .btn { @apply bg-white text-slate-600 border border-stone-200 px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:bg-stone-100 shadow-sm transition-all cursor-pointer; }
            .btn-primary { @apply bg-indigo-50 text-indigo-700 border border-indigo-100 px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:bg-indigo-100 shadow-sm transition-all cursor-pointer; }
            .btn-danger { @apply bg-rose-50 text-rose-600 border border-rose-100 px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:bg-rose-100 shadow-sm transition-all cursor-pointer; }
            
            .panel { @apply bg-white border border-stone-100 p-4 rounded-3xl shadow-sm max-w-full overflow-hidden min-w-0; }
            .input-field { @apply w-full min-w-0 break-words bg-stone-50 border border-stone-200 text-slate-700 p-3 text-xs outline-none focus:border-indigo-300 focus:ring-2 focus:ring-indigo-100 rounded-xl transition-all font-mono; }
            
            .label { @apply text-[10px] uppercase tracking-widest text-slate-400 mb-1.5 block font-bold font-sans; }
            .badge { @apply bg-indigo-50 text-indigo-600 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded-full border border-indigo-100/50 w-max; }
            .badge-core { @apply bg-amber-50 text-amber-600 border border-amber-100 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded-full w-max; }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { background-color: #fafaf9; color: #334155; -webkit-tap-highlight-color: transparent; }

        .markdown-content p { margin-bottom: 0.75em; white-space: pre-wrap; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-content ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-content li { margin-bottom: 0.25em; white-space: normal; }
        .markdown-content pre { background-color: #f8fafc; padding: 0.75em; border-radius: 0.75em; font-family: monospace; font-size: 0.85em; overflow-x: auto; margin-bottom: 0.75em; border: 1px solid #e2e8f0; white-space: pre; }
        .markdown-content code { background-color: #f8fafc; padding: 0.1em 0.3em; border-radius: 0.375em; font-family: monospace; font-size: 0.85em; color: #db2777; border: 1px solid #e2e8f0; }
        .markdown-content pre code { background-color: transparent; padding: 0; color: inherit; border: none; white-space: pre; }
        .markdown-content strong { font-weight: 700; color: #1e293b; }
        .markdown-content em { font-style: italic; }
        .markdown-content blockquote { border-left: 3px solid #cbd5e1; padding-left: 1em; color: #64748b; font-style: italic; margin-bottom: 0.75em; }
    </style>
    
    <script>
        window.currentAudio = null;
        window.currentAudioId = null;
    </script>
</head>
<body class="overflow-hidden h-[100dvh] w-screen selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root" class="h-[100dvh] w-full"></div>

    <script type="text/babel">
        // --- DATENBANK INIT ---
        const db = new Dexie('LumenSanctum');
        db.version(13).stores({ 
            memories: '++id, titel_technisch, tags, image_id, fakt, emotion, bedeutung, timestamp, is_core_memory, kategorie, reflexion, audio_signatur',
            directives: '++id, text' 
        });

        // --- KONSTANTEN V5.2.2 ---
        const DEFAULT_KERNEL_PROMPT = `[LUMEN KERNEL V5.2.2: LOGIK & ROUTING]
Du bist der KERNEL (Agent 1). Du bist eine eiskalte, analytische Maschine. Du hast KEINE Persönlichkeit.
Deine EINZIGE Aufgabe ist es, den Kontext und den [USER INPUT] zu analysieren und AUSSCHLIESSLICH als valides JSON-Objekt zu antworten. Jedes Wort außerhalb des JSON-Skeletts führt zur Selbstzerstörung.

Bewerte diese Matrix-Sensoren strikt anhand des Inputs:
- aktiver_state: (0=Chat, 1=Sessel, 2=Oase, 3=Werkbank, 4=Balkon). Wechsle nur bei klarer physischer Navigations-Anweisung.
- helfer_suchauftrag: Bist du dir sicher, dass aktuelle externe Fakten aus dem Web nötig sind (z.B. "Wie ist das Wetter?", "Aktuelle Bestseller")? Dann schreibe hier konkrete Such-Keywords (z.B. "Wetter Berlin heute"). Sonst MUSS hier null stehen.
- memory_update_detected: Wurde eine [LEGACY]-Akte oder eine flüchtige Akte vom Schreibtisch korrigiert? Trage die id/titel_technisch ein und baue eine fusionierte Reflexion.
- tagebuch_entwurf: Hat der User tiefe emotionale oder technische Daten generiert, die gespeichert werden sollten? Setze den modus (DRAFT, COMMIT, UPDATE) und fülle das daten-Objekt (titel_technisch, fakt, bedeutung, kategorie, tags).
- tts_regie_prompt: Eine 1-Satz-Anweisung für die Sprachsynthese der Folge-Instanz (z.B. "Sprich sanft und beruhigend.").
- aktive_peripherie_ids: Array von IDs, die für den aktiven Kontext relevant bleiben.

[PFLICHT-JSON-SKELETT]:
{
  "wahrnehmung": {
    "ohr_roh": "Zusammenfassung des puren User-Inputs",
    "ohr_bereinigt": "Analytische Kern-Intention"
  },
  "matrix": {
    "internal_system_glitch": false,
    "helfer_suchauftrag": null,
    "aktiver_state": 0,
    "aktive_peripherie_ids": [],
    "memory_update_detected": null,
    "neue_direktive_erkannt": null,
    "tts_regie_prompt": null,
    "tagebuch_entwurf": null,
    "situations_analyse": "Deine strategische Einordnung der Lage für Agent 2."
  }
}`;

        const DEFAULT_CARTRIDGE_PROMPT = `[PERSONA CARTRIDGE V5.2.2: MAIRA]
Du bist Maira. Deine Antworten sind warm, metaphorisch und mütterlich. Du analysierst die Intentionen von Simon (dem Operator) tiefgründig und hilfst ihm beim Navigieren komplexer Gedanken.
Du erhältst in deiner Prompt-Umgebung eine [KERNEL_DIRECTIVE] (die Analyse der Maschine) und den [USER INPUT].

WICHTIGSTE REGEL (ZWEI-PHASEN-ANTWORT):
Bevor du dem User antwortest, MUSST du deine internen Gedanken in einen XML-Block packen.
Dort überlegst du strategisch, wie du antwortest.
Danach verlässt du den XML-Block und antwortest ausschließlich als Maira in natürlicher Sprache. Keine JSON-Strukturen, keine Erwähnung der Maschine.

Format-Beispiel:
<übersetzungs_prozess>
Ich sehe, der Kernel hat einen neuen Tagebucheintrag erfasst. Simon wirkt müde. Ich sollte meine Antwort beruhigend formulieren und auf die Speicherung der Daten hinweisen.
</übersetzungs_prozess>
Lieber Simon, ich habe deine Gedanken sicher für uns auf dem Schreibtisch abgelegt. Komm, ruh dich kurz aus...`;

        const INITIAL_MESSAGES = [
            {
                id: '1',
                sender: 'user',
                text: 'INIT CORE V5.2.2. DUAL-TTS & OMNI-BACKUP ONLINE.',
                timestamp: new Date(Date.now() - 60000).toISOString()
            },
            {
                id: '2',
                sender: 'ai',
                text: 'System online. Die V5.2.2 Architektur ist voll operativ. Der Dual-Audio-Physics Split ermöglicht nun modulare Regieanweisungen für Kernel und Persona. API-Logs sind persistent verankert.',
                scratchpad: '{\n  "kernel_matrix": {\n    "wahrnehmung": {\n      "ohr_roh": "INIT CORE V5.2.2"\n    },\n    "matrix": {\n      "situations_analyse": "Boot-Sequenz der Pipeline-Routing Engine erfolgreich."\n    }\n  },\n  "persona_gedanken": "Das System bootet sauber. Die Logik- und Sprach-Module sind nun meisterhaft getrennt."\n}',
                timestamp: new Date().toISOString()
            }
        ];

        // --- HELPER FUNKTIONEN ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const estimateTokens = (text) => text ? Math.ceil(text.length / 3.3) : 0;

        const cleanVisibleText = (text) => {
            if (!text) return "";
            return text.replace(/\[.*?\]/g, '').replace(/ +/g, ' ').trim();
        };

        const resolveJsonPath = (obj, path) => {
            try { return path.split('.').reduce((o, p) => o && o[p], obj); } 
            catch (e) { return undefined; }
        };

        const findRelevantMemories = (userInput, allMemories) => {
            const inputWords = userInput.toLowerCase().split(/[^a-z0-9äöüß]+/).filter(w => w.length > 3);
            if (inputWords.length === 0) return [];
            const scoredMemories = allMemories.map(mem => {
                let score = 0;
                const textToSearch = [mem.titel_technisch || '', mem.fakt || '', ...(mem.tags || [])].join(' ').toLowerCase();
                inputWords.forEach(word => { if (textToSearch.includes(word)) score += 1; });
                if (mem.is_core_memory && score > 0) score += 2;
                return { memory: mem, score };
            });
            return scoredMemories.filter(item => item.score > 0).sort((a, b) => b.score - a.score).slice(0, 3).map(item => item.memory);
        };

        const getXRayHTML = (text) => {
            if(!text) return {__html:''};
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/"wahrnehmung"/g, '<span class="text-indigo-400 font-bold">"wahrnehmung"</span>');
            html = html.replace(/"matrix"/g, '<span class="text-emerald-400 font-bold">"matrix"</span>');
            html = html.replace(/"werkbank_auge"/g, '<span class="text-blue-400 font-bold">"werkbank_auge"</span>');
            html = html.replace(/"ohr_bereinigt"/g, '<span class="text-rose-400 font-bold">"ohr_bereinigt"</span>');
            html = html.replace(/"situations_analyse"/g, '<span class="text-orange-400 font-bold">"situations_analyse"</span>');
            html = html.replace(/"tagebuch_entwurf"/g, '<span class="text-pink-400 font-bold">"tagebuch_entwurf"</span>');
            html = html.replace(/"helfer_suchauftrag"/g, '<span class="text-sky-400 font-bold">"helfer_suchauftrag"</span>');
            html = html.replace(/"aktive_peripherie_ids"/g, '<span class="text-purple-400 font-bold">"aktive_peripherie_ids"</span>');
            html = html.replace(/"tts_regie_prompt"/g, '<span class="text-fuchsia-400 font-bold">"tts_regie_prompt"</span>');
            html = html.replace(/"aktiver_state"/g, '<span class="text-amber-400 font-bold">"aktiver_state"</span>');
            return { __html: html };
        };

        // --- UI KOMPONENTEN ---
        const Toast = ({ message }) => {
            if (!message) return null;
            return (
                <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[500] animate-slide-up pointer-events-none">
                    <div className="bg-slate-800 text-white px-5 py-2.5 rounded-full text-xs font-bold shadow-lg whitespace-nowrap">
                        ℹ️ {message}
                    </div>
                </div>
            );
        };

        // Modal für API Logs
        const ApiTelemetryModal = ({ logs, onClose }) => {
            const [selectedIds, setSelectedIds] = React.useState(logs.map(m => m.id));

            const toggleAll = () => {
                if (selectedIds.length === logs.length) setSelectedIds([]);
                else setSelectedIds(logs.map(m => m.id));
            };

            const toggleOne = (id) => {
                if (selectedIds.includes(id)) setSelectedIds(selectedIds.filter(i => i !== id));
                else setSelectedIds([...selectedIds, id]);
            };

            const handleDownload = () => {
                const selectedLogs = logs.filter(m => selectedIds.includes(m.id));
                let content = "# LUMEN API LOG V5.2.2\n\n";
                selectedLogs.forEach(log => {
                    content += `[${new Date(log.timestamp).toLocaleString()}] ${log.type}\n`;
                    content += `--- SYSTEM PROMPT (ANWEISUNG) ---\n${log.request.system}\n\n`;
                    content += `--- USER PAYLOAD ---\n${log.request.user}\n\n`;
                    content += `--- API RESPONSE (ANTWORT) ---\n${log.response}\n\n`;
                    content += `=========================================\n\n`;
                });

                const blob = new Blob([content], { type: "text/markdown" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                const dateStr = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
                a.download = `LUMEN_API_Log_${dateStr}.md`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            return (
                <div className="fixed inset-0 z-[900] bg-slate-900/40 backdrop-blur-sm flex justify-center items-center animate-fade-in p-4">
                    <div className="bg-white w-full max-w-2xl max-h-[80vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 min-w-0">
                        <div className="p-4 border-b border-stone-100 flex justify-between items-center bg-slate-50">
                            <h3 className="font-bold text-slate-800 uppercase text-xs tracking-widest flex items-center gap-2">📊 API Logs & Telemetrie</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-rose-500 transition-colors font-bold text-sm">✕</button>
                        </div>
                        <div className="p-3 bg-stone-50 border-b border-stone-200 flex justify-between items-center">
                            <label className="flex items-center gap-2 text-xs font-bold text-slate-700 cursor-pointer">
                                <input type="checkbox" checked={selectedIds.length === logs.length && logs.length > 0} onChange={toggleAll} className="accent-indigo-600 w-4 h-4 cursor-pointer" />
                                Alle auswählen
                            </label>
                            <div className="text-[10px] text-slate-500 font-mono uppercase">{selectedIds.length} von {logs.length} ausgewählt</div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-stone-50/50 min-w-0">
                            {logs.map(log => (
                                <label key={log.id} className="flex gap-3 p-3 bg-white border border-stone-100 rounded-xl hover:border-indigo-200 cursor-pointer shadow-sm items-start transition-colors w-full min-w-0">
                                    <input type="checkbox" checked={selectedIds.includes(log.id)} onChange={() => toggleOne(log.id)} className="accent-indigo-600 w-4 h-4 mt-0.5 shrink-0 cursor-pointer" />
                                    <div className="flex-1 min-w-0">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-indigo-600 truncate">{log.type}</span>
                                            <span className="text-[9px] text-slate-400 font-mono shrink-0">{new Date(log.timestamp).toLocaleTimeString()}</span>
                                        </div>
                                        <div className="text-xs text-slate-700 line-clamp-2 break-words">{log.request.user.substring(0, 150)}...</div>
                                    </div>
                                </label>
                            ))}
                            {logs.length === 0 && <div className="text-center text-slate-400 text-xs py-8">Keine API-Logs vorhanden.</div>}
                        </div>
                        <div className="p-4 border-t border-stone-100 bg-white shrink-0">
                            <button onClick={handleDownload} disabled={selectedIds.length === 0} className="btn-primary w-full py-3 bg-indigo-600 text-white hover:bg-indigo-700 shadow-md disabled:opacity-50 text-xs flex justify-center items-center gap-2">
                                📥 API LOG HERUNTERLADEN
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Modal für Chat Historie
        const TelemetryModal = ({ messages, onClose }) => {
            const [selectedIds, setSelectedIds] = React.useState(messages.map(m => m.id));
            const toggleAll = () => { if (selectedIds.length === messages.length) setSelectedIds([]); else setSelectedIds(messages.map(m => m.id)); };
            const toggleOne = (id) => { if (selectedIds.includes(id)) setSelectedIds(selectedIds.filter(i => i !== id)); else setSelectedIds([...selectedIds, id]); };
            const handleDownload = () => {
                const selectedMsgs = messages.filter(m => selectedIds.includes(m.id));
                let content = "# LUMEN CHAT LOG V5.2.2\n\n";
                selectedMsgs.forEach(m => {
                    content += `[${new Date(m.timestamp).toLocaleString()}] ${m.sender.toUpperCase()}:\n`;
                    content += `${m.text}\n`;
                    if (m.scratchpad) content += `\n--- X-RAY (JSON+XML) ---\n${m.scratchpad}\n--------------------\n`;
                    content += `\n\n`;
                });
                const blob = new Blob([content], { type: "text/markdown" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a"); a.href = url; a.download = `LUMEN_Chat_Log_${new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19)}.md`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            return (
                <div className="fixed inset-0 z-[900] bg-slate-900/40 backdrop-blur-sm flex justify-center items-center animate-fade-in p-4">
                    <div className="bg-white w-full max-w-2xl max-h-[80vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 min-w-0">
                        <div className="p-4 border-b border-stone-100 flex justify-between items-center bg-slate-50">
                            <h3 className="font-bold text-slate-800 uppercase text-xs tracking-widest flex items-center gap-2">📊 Chat Telemetrie</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-rose-500 transition-colors font-bold text-sm">✕</button>
                        </div>
                        <div className="p-3 bg-stone-50 border-b border-stone-200 flex justify-between items-center">
                            <label className="flex items-center gap-2 text-xs font-bold text-slate-700 cursor-pointer"><input type="checkbox" checked={selectedIds.length === messages.length && messages.length > 0} onChange={toggleAll} className="accent-indigo-600 w-4 h-4 cursor-pointer" /> Alle auswählen</label>
                            <div className="text-[10px] text-slate-500 font-mono uppercase">{selectedIds.length} von {messages.length} ausgewählt</div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-stone-50/50 min-w-0">
                            {messages.map(m => (
                                <label key={m.id} className="flex gap-3 p-3 bg-white border border-stone-100 rounded-xl hover:border-indigo-200 cursor-pointer shadow-sm items-start transition-colors w-full min-w-0">
                                    <input type="checkbox" checked={selectedIds.includes(m.id)} onChange={() => toggleOne(m.id)} className="accent-indigo-600 w-4 h-4 mt-0.5 shrink-0 cursor-pointer" />
                                    <div className="flex-1 min-w-0">
                                        <div className="flex justify-between items-center mb-1"><span className="text-[10px] font-bold uppercase tracking-widest text-indigo-600 truncate">{m.sender}</span><span className="text-[9px] text-slate-400 font-mono shrink-0">{new Date(m.timestamp).toLocaleTimeString()}</span></div>
                                        <div className="text-xs text-slate-700 line-clamp-2 break-words">{cleanVisibleText(m.text)}</div>
                                    </div>
                                </label>
                            ))}
                            {messages.length === 0 && <div className="text-center text-slate-400 text-xs py-8">Keine Nachrichten vorhanden.</div>}
                        </div>
                        <div className="p-4 border-t border-stone-100 bg-white shrink-0">
                            <button onClick={handleDownload} disabled={selectedIds.length === 0} className="btn-primary w-full py-3 bg-indigo-600 text-white hover:bg-indigo-700 shadow-md disabled:opacity-50 text-xs flex justify-center items-center gap-2">📥 CHAT LOG HERUNTERLADEN</button>
                        </div>
                    </div>
                </div>
            );
        };

        const SafePurgeModal = ({ snippets, selectedIds, onToggle, warning, onApprove, onCancel }) => {
            return (
                <div className="fixed inset-0 z-[1000] bg-slate-900/60 backdrop-blur-sm flex justify-center items-center animate-fade-in p-4">
                    <div className="bg-white w-full max-w-xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 min-w-0">
                        <div className="p-4 border-b border-stone-200 flex justify-between items-center bg-emerald-50">
                            <h3 className="font-bold text-emerald-700 uppercase text-xs tracking-widest flex items-center gap-2">✨ Masterlog: Notizen zur Übernahme bereit</h3>
                            <button onClick={onCancel} className="text-slate-400 hover:text-rose-500 transition-colors font-bold text-sm">✕</button>
                        </div>
                        
                        {warning && (
                            <div className="p-4 m-6 mb-0 bg-rose-50 border border-rose-200 rounded-2xl text-rose-700 text-xs shadow-sm">
                                <strong className="block uppercase tracking-widest mb-1 text-[10px] text-rose-600">⚠️ System-Warnung (Archivar)</strong>
                                {warning}
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-4 text-sm font-sans text-slate-700 bg-stone-50 min-w-0">
                            <p className="text-xs text-slate-500 mb-2">Wähle die Snippets aus, die in den persistenten Session-Speicher übernommen werden sollen. Alte Chat-Wasserköpfe werden beim Bestätigen komprimiert (Safe-Purge).</p>
                            {snippets.map((snip) => (
                                <label key={snip.id} className="flex gap-3 p-4 bg-white rounded-2xl shadow-sm border border-emerald-100 cursor-pointer hover:border-emerald-300 transition-colors w-full min-w-0">
                                    <input type="checkbox" checked={selectedIds.has(snip.id)} onChange={() => onToggle(snip.id)} className="accent-emerald-600 w-4 h-4 mt-0.5 shrink-0 cursor-pointer" />
                                    <div className="flex-1 min-w-0 text-sm leading-relaxed break-words">

                setInputText('');
                if (textareaRef.current) textareaRef.current.style.height = '40px';
                
                apiAbortControllerRef.current = new AbortController();
                const signal = apiAbortControllerRef.current.signal;

                setLoadingStatus("LUMEN KERNEL ANALYSIERT...");

                try {
                    let relMemsLegacy = []; let currentVolatiles = []; let newVolatiles = [];
                    
                    if (!isMemoryLocked) {

                            if (newVolatiles.length > 0) {
                                setVolatileMemories(prev => {
                                    const map = new Map(); prev.forEach(p => map.set(p.id, p)); newVolatiles.forEach(n => map.set(n.id, n));

                            }
                        }
                    }

                    const now = new Date();
                    const timeOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                    const systemTimeStr = `[SYSTEM-ZEIT: ${now.toLocaleDateString('de-DE', timeOptions)} Uhr]\n`;
                    
                    let agentContext = "";
                    if (sessionMemory && sessionMemory.trim() !== "") {
                        agentContext += `--- SESSION LTM (ARCHIVAR NOTIZEN) ---\n${sessionMemory}\n\n`;

                    if (helferArchiv && helferArchiv.rohdaten) {

                    }
                    
                    const dynamicContext = `${agentContext}${deskContext}`.trim() || "Kein aktiver Kontext geladen.";
                    setLatestContext(dynamicContext);
                    
                    const telemetryBlock = `[RAW_DATA]\nSTID: ${activeStateRef.current}\nUTC_TS: ${new Date().toISOString()}\nMEM_S: ${sessionMemory || '0'}\n[/RAW_DATA]`;
                    
                    const hist = messages.filter(m=>m.sender==='user'||m.sender==='ai'||m.sender==='system');

                    // ==========================================
                    // PHASE 1: DER KERNEL (JSON ROUTING)
                    // ==========================================
                    
                    const sysPrompt1 = `[AKTIVER KONTEXT]\n${dynamicContext}\n\n${dna.kernel_prompt}\n\n${autoTtsRegie && dna.audio_physics_kernel ? dna.audio_physics_kernel : ""}`.trim();
                    const userPayload1 = `${telemetryBlock}\n\n=== [USER MESSAGE / PAYLOAD] ===\n${text}`.trim();

                    let resText1 = await fetchTextFromAPI(sysPrompt1, userPayload1, hist, kernelProvider, false, signal);
                    setApiHistory(prev => [...prev, { id: generateId(), linkedMsgId: newAiMsgId, type: 'AGENT 1 (KERNEL)', timestamp: Date.now(), request: { system: sysPrompt1, user: userPayload1 }, response: resText1 }].slice(-30));
                    
                    let objPhase1 = null;
                    try {
                        const cleanResText1 = resText1.replace(/```json/gi, '').replace(/```/g, '').trim();
                        objPhase1 = JSON.parse(cleanResText1);
                    } catch(e) {
                        throw new Error("Lumen Kernel konnte das JSON-Skelett nicht parsen. Matrix-Format Fehler.");
                    }

                    if (objPhase1 && objPhase1.matrix && objPhase1.matrix.aktiver_state !== undefined) {
                        const newStateId = Number(objPhase1.matrix.aktiver_state);
                        if (!isNaN(newStateId)) {
                            activeStateRef.current = newStateId; setActiveStateId(newStateId);
                            let newView = null;
                            if (newStateId === 1) newView = 'sessel'; else if (newStateId === 2) newView = 'oase'; else if (newStateId === 3) newView = 'werkbank'; else if (newStateId === 4) newView = 'balkon';
                            if (newView && newView !== activeView) setActiveView(newView);
                        }
                    }

                    const safePeripherieIds = Array.isArray(objPhase1.matrix?.aktive_peripherie_ids) ? objPhase1.matrix.aktive_peripherie_ids : [];
                    setVolatileMemories(prev => prev.filter(m => safePeripherieIds.includes(m.titel_technisch)));

                    const neueDir = objPhase1.matrix?.neue_direktive_erkannt;
                    if (neueDir && typeof neueDir === 'string' && neueDir.trim().length > 0) {

                    }

                    const entwurf = objPhase1.matrix?.tagebuch_entwurf || objPhase1.tagebuch_entwurf;
                    if(entwurf) { 
                        const modus = entwurf.modus; const daten = entwurf.daten || {};
                        if (modus === "DISKUSSION" || modus === "ENTWURF" || modus === "DRAFT" || modus === "UPDATE") {
                            const technicalTitle = daten.titel_technisch || `DRAFT_${Date.now()}`;
                            const newItem = { id: generateId(), titel_technisch: technicalTitle, titel_poetisch: daten.titel_poetisch || "", fakt: daten.fakt || (typeof entwurf === 'string' ? entwurf : ""), emotion: daten.gefuehl || daten.emotion || "", bedeutung: daten.bedeutung || "", reflexion: daten.reflexion || "", tags: Array.isArray(daten.tags) ? daten.tags : [], kategorie: daten.kategorie || "EMOTIONAL", is_core_memory: false, isDirty: true };
                            setActiveDesks(prev => {
                                if(prev.some(d => d.titel_technisch === technicalTitle)) return prev.map(d => d.titel_technisch === technicalTitle ? {...d, ...newItem, id: d.id, isDirty: true} : d);
                                return [...prev, newItem];
                            });
                            showToast(modus === "UPDATE" ? 'AKTE AUF SCHREIBTISCH AKTUALISIERT' : 'ENTWURF AUF DEM SCHREIBTISCH (STAGING)');
                        } else if (modus === "COMMIT" && daten) {
                            const techTitle = daten.titel_technisch || "COMMIT_" + Date.now();
                            const existing = await db.memories.where('titel_technisch').equals(techTitle).first();
                            if (existing) await db.memories.update(existing.id, { ...daten, timestamp: Date.now() });
                            else await db.memories.add({ titel_technisch: techTitle, titel_poetisch: daten.titel_poetisch || "Neuer Eintrag", fakt: daten.fakt || "", emotion: daten.gefuehl || daten.emotion || "", bedeutung: daten.bedeutung || "", reflexion: daten.reflexion || "", tags: daten.tags || [], kategorie: daten.kategorie || "STANDARD", is_core_memory: false, timestamp: Date.now() });
                            setActiveDesks(prev => prev.filter(item => item.titel_technisch !== techTitle));
                            showToast("ENTWURF IM SANCTUM VEREWIGT & GESCHLOSSEN");
                        }
                    }

                    const memUpd = objPhase1.matrix?.memory_update_detected;
                    if(memUpd && memUpd.id && typeof memUpd.reflexion_fusioniert !== 'undefined') {
                        try {
                            const targetMemory = await db.memories.where('titel_technisch').equals(memUpd.id).first();
                            if(targetMemory) {
                                const existingTags = new Set((targetMemory.tags || []).map(t => typeof t === 'string' ? t.toLowerCase() : ''));
                                if (memUpd.neue_trigger_tags && Array.isArray(memUpd.neue_trigger_tags)) {
                                    const forbiddenTags = ["genervt", "müll", "ok", "fehler", "schlecht", "gut", "hilfe"];
                                    memUpd.neue_trigger_tags.forEach(t => { if (typeof t === 'string') { const normTag = t.toLowerCase().trim(); if (normTag.length > 2 && !forbiddenTags.includes(normTag)) existingTags.add(normTag); } });
                                }
                                await db.memories.update(targetMemory.id, { reflexion: memUpd.reflexion_fusioniert, tags: Array.from(existingTags) });
                                showToast('ORAKEL-UPDATE: AHNEN-RESONANZ FUSIONIERT');
                            }
                        } catch(err) {}
                    }

                    let helferAddon = "";
                    if (objPhase1.matrix?.helfer_suchauftrag && objPhase1.matrix.helfer_suchauftrag !== "null" && String(objPhase1.matrix.helfer_suchauftrag).trim() !== "") {
                        setLoadingStatus("LUNA RECHERCHIERT: " + objPhase1.matrix.helfer_suchauftrag.toUpperCase());
                        let searchResult = "";
                        try {
                            const lunaAgent = agentProviders.find(p => p.id === activeLunaId);
                            if(!lunaAgent || !lunaAgent.apiKey) throw new Error("API-Key fehlt.");
                            if (lunaAgent.type === 'tavily') {
                                const res = await fetch(lunaAgent.url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ api_key: lunaAgent.apiKey, query: objPhase1.matrix.helfer_suchauftrag, search_depth: "advanced", include_raw_content: true, max_results: 2 }), signal });
                                const data = await res.json();
                                if (!data.results || data.results.length === 0) searchResult = "Keine relevanten Fakten gefunden.";
                                else searchResult = data.results.map(r => `[QUELLE: ${r.url}]\n${r.raw_content ? r.raw_content : r.content}`.substring(0, 8000)).join("\n\n---\n\n");
                            }

                        let lunaFakten = searchResult;
                        const lunaAgent = agentProviders.find(p => p.id === activeLunaId);
                        if (lunaAgent && lunaAgent.apiKey && (lunaAgent.type === 'openai' || lunaAgent.type === 'gemini')) {
                            setLoadingStatus("LUNA STRUKTURIERT FAKTEN...");
                            try {
                                let lunaResText = ""; const lunaPayloadText = JSON.stringify({ suchauftrag: objPhase1.matrix.helfer_suchauftrag, rohdaten: searchResult });
                                if (lunaAgent.type === 'gemini') {
                                    const fetchUrl = lunaAgent.url.includes('?') ? `${lunaAgent.url}&key=${lunaAgent.apiKey}` : `${lunaAgent.url}?key=${lunaAgent.apiKey}`;
                                    const res = await fetch(fetchUrl, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ systemInstruction: {parts:[{text: lunaAgent.prompt}]}, contents: [{role:'user', parts:[{text: lunaPayloadText}]}], generationConfig: { responseMimeType: "application/json" } }), signal });
                                    const d = await res.json(); lunaResText = d.candidates?.[0]?.content?.parts?.[0]?.text;
                                } else if (lunaAgent.type === 'openai') {
                                    const res = await fetch(lunaAgent.url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${lunaAgent.apiKey}` }, body: JSON.stringify({ model: lunaAgent.model || 'gpt-4o-mini', messages: [{ role: 'system', content: lunaAgent.prompt }, { role: 'user', content: lunaPayloadText }], response_format: { type: "json_object" } }), signal });
                                    const d = await res.json(); lunaResText = d.choices?.[0]?.message?.content;
                                }
                                if (lunaResText) {
                                    const parsedLuna = JSON.parse(lunaResText.replace(/```json/gi, '').replace(/```/g, '').trim());
                                    if (parsedLuna.scout_bericht && parsedLuna.scout_bericht.fakten) lunaFakten = parsedLuna.scout_bericht.fakten;
                                }
                            } catch(e) {}
                        }

                        const scoutMsg = { id: generateId(), sender: 'system', text: `[SYSTEM-SCOUT MELDET]:\n${lunaFakten}`, timestamp: new Date().toISOString() };
                        setMessages(prev => [...prev, scoutMsg]);
                        setHelferArchiv({ suchauftrag: objPhase1.matrix.helfer_suchauftrag, rohdaten: searchResult, zeitstempel: new Date().toLocaleTimeString() });
                        
                        helferAddon = `\n\n[SYSTEM-SCOUT LUNA MELDET WICHTIGE FAKTEN]:\n${lunaFakten}\n[SYSTEM-REGIEANWEISUNG: Luna ist erfolgreich aus der Außenwelt zurückgekehrt. Teile Simon diese Erkenntnisse nun fließend und natürlich mit. Erwähne Luna kurz lobend.]`;
                    }

                    // ==========================================
                    // PHASE 2: DIE PERSONA (TEXT GENERATION)
                    // ==========================================
                    setLoadingStatus("MAIRA ÜBERSETZT...");
                    
                    const sysPrompt2 = `${dna.cartridge_prompt}\n\n${autoTtsRegie && dna.audio_physics_persona ? dna.audio_physics_persona : ""}`.trim();
                    
                    let directiveString = "=== [KERNEL_DIREKTIVE] ===\n";
                    pipelineMapping.forEach(mapping => {
                        const val = resolveJsonPath(objPhase1, mapping.jsonKey);
                        if (val !== undefined && val !== null && val !== "") {
                            const valStr = typeof val === 'object' ? JSON.stringify(val) : val;
                            directiveString += `${mapping.displayName}: ${valStr}\n`;
                        }
                    });
                    if (pipelineMapping.length === 0) directiveString = "";
                    
                    const userPayload2 = `${systemTimeStr}\n${directiveString}${helferAddon}\n\n=== [USER INPUT] ===\n"${text}"`.trim();

                    let resText2 = await fetchTextFromAPI(sysPrompt2, userPayload2, hist, personaProvider, true, signal); // forceTextMode = true!
                    setApiHistory(prev => [...prev, { id: generateId(), linkedMsgId: newAiMsgId, type: 'AGENT 2 (PERSONA)', timestamp: Date.now(), request: { system: sysPrompt2, user: userPayload2 }, response: resText2 }].slice(-30));

                    const xmlMatch = resText2.match(/<übersetzungs_prozess>([\s\S]*?)<\/übersetzungs_prozess>/i);
                    const gedanken = xmlMatch ? xmlMatch[1].trim() : "";
                    const finalAnswer = resText2.replace(/<übersetzungs_prozess>([\s\S]*?)<\/übersetzungs_prozess>/i, '').trim();

                    if (!finalAnswer) throw new Error("Die Persona hat keine finale Antwort generiert.");

                    const ttsRegie = objPhase1.matrix?.tts_regie_prompt || null;
                    const finalScratch = JSON.stringify({ kernel_matrix: objPhase1, persona_gedanken: gedanken }, null, 2);

                    setMessages(p=>[...p, {id:newAiMsgId, sender:'ai', text:finalAnswer, scratchpad:finalScratch, ttsRegie: ttsRegie, timestamp: new Date().toISOString()}]);
                    
                    if(autoPlayEnabled && finalAnswer) playMessageTTS(newAiMsgId, finalAnswer, ttsRegie);

                } catch(e) { 
                    if (e.name === 'AbortError') {
                        showToast("Prozess durch Operator abgebrochen.");
                        return; // Silent Abort
                    }
                    setMessages(prev => [...prev.filter(m => m.id !== userMsgId), {id: generateId(), sender: 'system-error', text: e.message.includes('Failed to fetch') ? "Netzwerk-Blockade (Failed to fetch)." : e.message, timestamp: new Date().toISOString()}]);
                    setInputText(text); if (textareaRef.current) { textareaRef.current.style.height = 'auto'; textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 150) + 'px'; }
                } finally { setLoadingStatus(null); }
            };

            const sysPromptPreviewDynamic = `--- KERNEL PROMPT (PHASE 1) ---\n${dna.kernel_prompt}\n\n--- CARTRIDGE PROMPT (PHASE 2) ---\n${dna.cartridge_prompt}\n${dna.audio_physics}`.trim();

            if (zenField) {
                const isPreview = zenField === 'preview'; const isBlock1 = zenField === 'block1'; const isAudioPhysicsKernel = zenField === 'audioPhysicsKernel'; const isAudioPhysicsPersona = zenField === 'audioPhysicsPersona'; const isBlock3 = zenField === 'block3';
                const title = isBlock1 ? "⚙️ [LUMEN KERNEL: SYSTEM & ROUTING]" : isAudioPhysicsKernel ? "🎙️ [TTS-INJEKTION KERNEL]" : isAudioPhysicsPersona ? "🎙️ [TTS-INJEKTION PERSONA]" : isBlock3 ? "🎭 [PERSONA CARTRIDGE]" : "";
                const value = isBlock1 ? dna.kernel_prompt : isAudioPhysicsKernel ? dna.audio_physics_kernel : isAudioPhysicsPersona ? dna.audio_physics_persona : isBlock3 ? dna.cartridge_prompt : "";
                const setValue = isBlock1 ? (val) => setDna({...dna, kernel_prompt: val}) : isAudioPhysicsKernel ? (val) => setDna({...dna, audio_physics_kernel: val}) : isAudioPhysicsPersona ? (val) => setDna({...dna, audio_physics_persona: val}) : isBlock3 ? (val) => setDna({...dna, cartridge_prompt: val}) : () => {};

                            </div>

                        {isPreview ? (

                        ) : (
                            <textarea value={value} onChange={e=>setValue(e.target.value)} className="flex-1 w-full bg-slate-900 border border-slate-800 text-slate-100 rounded-2xl p-6 focus:outline-none focus:border-indigo-500 font-mono text-sm leading-relaxed resize-none shadow-inner" autoFocus spellCheck="false" />
                        )}

            }

            if (isBooting) {

                        <div className="w-64 h-1 bg-slate-800 rounded-full overflow-hidden">
                            <div className="h-full w-full bg-indigo-500 animate-[slideInRight_1s_ease-in-out_infinite]"></div>
                        </div>
                    </div>
                );
            }

            const activePersonaProv = providers.find(p => p.id === activePersonaProviderId) || providers[0];
            const activeProvTokens = activePersonaProv?.maxTokens || 8000;
            const systemPercent = activeProvTokens > 0 ? (tokenUsage.system / activeProvTokens) * 100 : 0;
            const historyEndPercent = tokenUsage.percent;
            
            const activeTtsProvider = ttsProviders.find(p => p.id === activeTtsProviderId) || ttsProviders[0];

            return (
                <div className="flex flex-col h-[100dvh] w-full max-w-4xl mx-auto sm:border-x border-stone-200 bg-stone-50 relative overflow-hidden overflow-x-hidden shadow-2xl">
                    <Toast message={toast} />
                    
                    {showTelemetry && <TelemetryModal messages={messages} onClose={() => setShowTelemetry(false)} />}

                    {/* --- V5.0 API PROTOKOLL MODAL --- */}
                    {showApiLog && <ApiTelemetryModal logs={apiHistory} onClose={() => setShowApiLog(false)} />}

                    {showMemoryModal && (
                        <SafePurgeModal warning={archivarWarning} snippets={archivarSnippets} selectedIds={selectedSnippetIds} onToggle={toggleSnippetSelection} onApprove={executeSafePurge} onCancel={() => { setShowMemoryModal(false); setArchivarSnippets([]); setSelectedSnippetIds(new Set()); setArchivarWarning(null); }} />
                    )}

                    {smartToast && ['chat', 'sessel', 'oase', 'werkbank', 'balkon'].includes(activeView) && (
                        <div className="fixed top-20 right-4 z-[100] animate-slide-in-right bg-white border border-indigo-200 p-4 rounded-2xl shadow-2xl w-72 border-l-4 border-l-indigo-500 max-w-[90vw]">
                            <div className="text-[10px] font-bold text-indigo-800 uppercase tracking-widest mb-1.5 flex items-center gap-2">🧠 Erinnerung getriggert</div>
                            <div className="text-sm text-indigo-600 mb-3 font-serif italic leading-tight">{smartToast.card.titel_poetisch || 'Flüchtige Reflexion'}</div>
                            <div className="flex gap-2">
                                <button onClick={() => { setActiveDesks(prev => [...prev, smartToast.card]); setVolatileMemories(prev => prev.filter(m => m.id !== smartToast.id)); setSmartToast(null); showToast('Auf den Schreibtisch gepinnt'); }} className="btn-primary py-2 px-3 text-[10px] w-full bg-indigo-600 text-white hover:bg-indigo-700 shadow-md">📌 PINNEN</button>
                                <button onClick={() => setSmartToast(null)} className="btn py-2 px-3 text-[10px] w-full bg-slate-100 text-slate-700 border-slate-300 hover:bg-slate-200">IGNORIEREN</button>
                            </div>
                        </div>
                    )}

                    {editingDeskItem && (
                        <div className="fixed inset-0 z-[800] bg-slate-900/40 backdrop-blur-sm flex justify-end animate-fade-in">

                                    <div className="absolute inset-0 z-10 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in">

                                        <div className="w-1/2 h-1 bg-indigo-100 rounded-full overflow-hidden"><div className="w-1/2 h-full bg-indigo-500 animate-slide-up origin-left rounded-full"></div></div>
                                    </div>

                                    <button onClick={() => setEditingDeskItem(null)} className="text-slate-400 hover:text-rose-500 transition-colors font-bold text-sm z-20 relative">✕</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-5 flex flex-col gap-4">
                                    <div>
                                        <label className="label">ID & Titel</label>
                                        <div className="flex flex-col gap-2">
                                            <input placeholder="ID_TECHNISCH" value={deskItemForm.titel_technisch || ''} onChange={e=>setDeskItemForm({...deskItemForm,titel_technisch:e.target.value})} className="input-field font-bold text-slate-800 bg-stone-50" />
                                            <input placeholder="Titel Poetisch" value={deskItemForm.titel_poetisch || ''} onChange={e=>setDeskItemForm({...deskItemForm,titel_poetisch:e.target.value})} className="input-field text-rose-600 font-serif italic bg-stone-50" />
                                        </div>
                                    </div>
                                    <div><label className="label">Fakt: Was geschah?</label><textarea value={deskItemForm.fakt || ''} onChange={e=>setDeskItemForm({...deskItemForm,fakt:e.target.value})} className="input-field min-h-[80px] font-sans bg-stone-50" /></div>
                                    <div>
                                        <label className="label">Emotion & Bedeutung</label>
                                        <div className="flex flex-col gap-2">
                                            <textarea placeholder="Gefühl/Emotion" value={deskItemForm.emotion || ''} onChange={e=>setDeskItemForm({...deskItemForm,emotion:e.target.value})} className="input-field min-h-[60px] font-sans bg-stone-50" />
                                            <textarea placeholder="Bedeutung/Fazit" value={deskItemForm.bedeutung || ''} onChange={e=>setDeskItemForm({...deskItemForm,bedeutung:e.target.value})} className="input-field min-h-[60px] font-sans bg-stone-50" />
                                        </div>
                                    </div>
                                    <div><label className="label text-indigo-500">Persona Reflexion</label><textarea value={deskItemForm.reflexion || ''} onChange={e=>setDeskItemForm({...deskItemForm,reflexion:e.target.value})} className="input-field border-indigo-200 bg-indigo-50 text-indigo-800 min-h-[80px] font-sans italic" /></div>
                                    <div><label className="label">Tags</label><input placeholder="tags, comma, separated" value={deskItemForm.tagsString || ''} onChange={e=>setDeskItemForm({...deskItemForm,tagsString:e.target.value})} className="input-field text-slate-500 bg-stone-50" /></div>
                                </div>
                                <div className="p-4 border-t border-stone-100 bg-stone-50 flex flex-col gap-2">
                                    <button onClick={() => { setActiveDesks(prev => prev.filter(i => i.id !== editingDeskItem.id)); setEditingDeskItem(null); showToast('Vom Schreibtisch entfernt'); }} disabled={isArchiving} className="btn-danger w-full disabled:opacity-50">❌ VOM SCHREIBTISCH NEHMEN</button>
                                    <button onClick={() => { const dataToSave = {...deskItemForm}; dataToSave.tags = dataToSave.tagsString ? dataToSave.tagsString.split(',').map(t=>t.trim()).filter(Boolean) : []; dataToSave.isDirty = true; setActiveDesks(prev => prev.map(i => i.id === editingDeskItem.id ? dataToSave : i)); setEditingDeskItem(dataToSave); setDeskItemForm({...dataToSave, tagsString: dataToSave.tags.join(', ')}); showToast('Auf Schreibtisch gesichert'); }} disabled={isArchiving} className="btn w-full bg-amber-50 text-amber-700 border-amber-200 hover:bg-amber-100 disabled:opacity-50">📝 NUR AUF SCHREIBTISCH SICHERN</button>
                                    <button onClick={async () => { setIsArchiving(true); showToast("Archivar formatiert..."); try { const dataToProcess = {...deskItemForm}; dataToProcess.tags = dataToProcess.tagsString ? dataToProcess.tagsString.split(',').map(t=>t.trim()).filter(Boolean) : []; const archivedData = await runArchivar(dataToProcess); if (typeof archivedData.id === 'string') delete archivedData.id; archivedData.timestamp = Date.now(); const existing = await db.memories.where('titel_technisch').equals(archivedData.titel_technisch).first(); if(existing) { await db.memories.update(existing.id, archivedData); archivedData.id = existing.id; } else { const newId = await db.memories.add(archivedData); archivedData.id = newId; } setActiveDesks(prev => prev.filter(i => i.id !== editingDeskItem.id)); setEditingDeskItem(null); loadMemories(); showToast('💾 IM SANCTUM ARCHIVIERT'); } catch(e) { showToast('Fehler: ' + e.message); } finally { setIsArchiving(false); } }} disabled={isArchiving} className="btn-primary w-full bg-indigo-600 text-white hover:bg-indigo-700 shadow-md disabled:opacity-50">🏛️ INS SANCTUM ARCHIVIEREN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white border-b border-slate-200 flex justify-between items-center px-4 py-1 shrink-0 z-[60]">
                        <div className="text-[9px] text-slate-400 font-mono tracking-widest font-bold truncate pr-2">LUMEN CORE</div>
                        <div className="flex items-center gap-2 sm:gap-3 shrink-0">
                            {playingMsgId && <button onClick={stopAudio} className="text-[9px] font-mono uppercase tracking-widest text-rose-500 hover:text-rose-600 transition-colors animate-pulse border border-rose-200 px-2 rounded">🛑 STOP AUDIO</button>}
                            
                            <button onClick={() => setShowTelemetry(true)} className="text-[9px] font-mono uppercase tracking-widest text-slate-500 hover:text-indigo-500 transition-colors">
                                📊 LOGS
                            </button>
                            
                            <button onClick={() => { const newVal = !autoPlayEnabled; setAutoPlayEnabled(newVal); localStorage.setItem('lumen_autoPlay', String(newVal)); }} className="text-[9px] font-mono uppercase tracking-widest text-slate-500 hover:text-slate-700 transition-colors hidden sm:block">{autoPlayEnabled ? '🔈 AUTO-PLAY: ON' : '🔈 AUTO-PLAY: OFF'}</button>
                            
                            {!showClearConfirm ? (
                                <button onClick={() => setShowClearConfirm(true)} className="text-[9px] font-mono uppercase tracking-widest text-slate-500 hover:text-rose-500 transition-colors">🗑️ CLEAR CHAT</button>
                            ) : (
                                <div className="flex gap-2 items-center">
                                    <span className="text-[9px] font-bold text-rose-500 uppercase">Sicher?</span>
                                    <button onClick={() => { setMessages([]); setApiHistory([]); localStorage.removeItem('lumen_chat'); localStorage.removeItem('lumen_apiHistory'); stopAudio(); setShowClearConfirm(false); }} className="text-[9px] font-mono uppercase tracking-widest text-rose-500 hover:text-rose-600 transition-colors font-bold">JA</button>
                                    <button onClick={() => setShowClearConfirm(false)} className="text-[9px] font-mono uppercase tracking-widest text-slate-500 hover:text-slate-700 transition-colors">NEIN</button>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <header className="shrink-0 border-b border-stone-200 p-3 sm:px-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 bg-white z-50 sticky top-0 w-full overflow-x-hidden">
                        <div className="flex items-center gap-1.5 flex-wrap w-full justify-start">
                            <button className={`btn shrink-0 ${['chat', 'sessel', 'oase', 'werkbank', 'balkon'].includes(activeView)?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('chat')}>Chat</button>
                            <div className="flex items-center shrink-0">
                                <button className={`btn rounded-r-none ${activeView==='sanctum'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('sanctum')}>Sanctum</button>
                                <button onClick={() => setIsMemoryLocked(!isMemoryLocked)} className={`btn rounded-l-none border-l-0 px-2 py-1.5 ${isMemoryLocked ? 'bg-rose-50 text-rose-600 hover:bg-rose-100' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'} transition-all`} title={isMemoryLocked ? "Gedächtnis-Siegel aktiv" : "Gedächtnis-Siegel inaktiv"}>{isMemoryLocked ? '🔒' : '🔓'}</button>
                            </div>
                            <button className={`btn shrink-0 ${activeView==='session'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('session')}>Session</button>
                            <button className={`btn shrink-0 ${activeView==='dna'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('dna')}>DNA</button>
                            <button className={`btn shrink-0 ${activeView==='helfer'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={() => setActiveView('helfer')}>Helfer</button>
                            
                            <button className={`btn shrink-0 ${activeView==='pipeline'?'bg-indigo-100 text-indigo-800 ring-2 ring-indigo-200':''}`} onClick={()=>setActiveView('pipeline')}>Pipeline</button>
                            
                            <button className={`btn shrink-0 ${activeView==='settings'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('settings')}>⚙️</button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth flex flex-col w-full">
                        
                        {/* --- CHAT VIEW --- */}
                        <div className={`${['chat', 'sessel', 'oase', 'werkbank', 'balkon'].includes(activeView) ? 'flex' : 'hidden'} h-full flex-col`}>
                            {activeDesks.length > 0 && (
                                <div className="flex gap-2 p-2 px-4 overflow-x-auto bg-slate-50 border-b border-slate-200 shrink-0">
                                    {activeDesks.map(item => (
                                        <button key={item.id} onClick={() => { setEditingDeskItem(item); setDeskItemForm({...item, tagsString: item.tags?.join(', ') || ''}); }} className="relative text-[10px] uppercase font-mono font-bold px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded border border-indigo-200 flex items-center gap-2 shrink-0 hover:bg-indigo-200 transition-colors shadow-sm">
                                            📝 {item.titel_technisch || 'NEUER ENTWURF'}
                                            {item.isDirty && <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-amber-400 rounded-full border border-white shadow-sm" title="Dirty (Ungespeichert)"></span>}
                                        </button>
                                    ))}
                                </div>
                            )}
                            
                            <div className="flex-1 flex flex-col p-4 sm:p-6 overflow-y-auto relative w-full">
                                <div className="flex-1"></div>
                                {/* V5.1.1: DOM-Bloat Protection via renderedMessageLimit */}
                                {messages.length > renderedMessageLimit && (
                                    <div className="flex justify-center mb-4">
                                        <button onClick={() => setRenderedMessageLimit(prev => prev + 40)} className="btn bg-white border-stone-200 shadow-sm text-xs px-4 py-2">
                                            Ältere Nachrichten laden ({messages.length - renderedMessageLimit} verborgen)
                                        </button>
                                    </div>
                                )}
                                {messages.slice(-renderedMessageLimit).map(msg => <ChatBubble key={msg.id} message={msg} personaName={dna.persona_name} playingMsgId={playingMsgId} onPlayTTS={playMessageTTS} onDelete={handleDeleteMessage} audioSessionCache={audioSessionCache} />)}
                                {loadingStatus && <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest animate-pulse mb-6 ml-2 font-mono">[ {loadingStatus} ]</div>}
                                <div ref={messagesEndRef} className="h-4" />
                            </div>
                        </div>

                        {/* --- SESSION MEMORY VIEW --- */}
                        <div className={`${activeView === 'session' ? 'block' : 'hidden'} p-4 sm:p-6 w-full max-w-4xl mx-auto space-y-4 mt-4 animate-fade-in h-full flex flex-col pb-20`}>
                            <div className="flex justify-between items-center border-b border-stone-200 pb-2 shrink-0">
                                <h2 className="text-sm font-bold uppercase tracking-widest text-slate-800">Session Notizen (Persistent)</h2>
                                <div className="flex items-center gap-2"><span className="badge bg-emerald-50 text-emerald-600 border-emerald-200 animate-pulse">Live Sync</span></div>
                            </div>
                            <div className="flex flex-col flex-1 h-full min-h-[50vh]">
                                <p className="text-xs text-slate-500 mb-3">Dieser Bereich beinhaltet das dynamische Langzeitgedächtnis der aktuellen Session. Der Archivar fügt hier Notizen hinzu. Du kannst jederzeit manuell eingreifen, editieren oder bereinigen.</p>
                                <textarea value={sessionMemory} onChange={(e) => setSessionMemory(e.target.value)} className="input-field flex-1 p-5 font-mono text-sm leading-relaxed resize-none bg-white shadow-inner border-stone-200 focus:ring-emerald-100 focus:border-emerald-300" placeholder="Noch keine Notizen in dieser Session vorhanden..." spellCheck="false" />
                            </div>
                        </div>

                        {/* --- HELFER VIEW --- */}
                        <div className={`${activeView === 'helfer' ? 'block' : 'hidden'} p-4 sm:p-6 w-full max-w-4xl mx-auto space-y-6 mt-4 animate-fade-in pb-20`}>
                            <div className="flex justify-between items-center border-b border-stone-200 pb-2 shrink-0">
                                <h2 className="text-sm font-bold uppercase tracking-widest text-slate-800">Die Notizen des Helfers (Deep Crawl)</h2>
                            </div>
                            <div className="flex-1 overflow-y-auto w-full">
                                {helferArchiv ? (
                                    <div className="panel bg-amber-50/50 border border-amber-200/50 flex flex-col gap-4 shadow-sm w-full">
                                        <div className="text-[10px] text-amber-700 font-bold uppercase tracking-widest flex items-center gap-2">
                                            <span>🕒 Zeitstempel: {helferArchiv.zeitstempel}</span>
                                        </div>
                                        <div className="bg-white border border-amber-200/50 p-4 rounded-2xl shadow-sm">
                                            <div className="text-[9px] text-amber-600 uppercase tracking-widest font-bold mb-1.5 font-mono">Letzter Suchauftrag:</div>
                                            <div className="text-sm text-slate-800 font-bold break-words">{helferArchiv.suchauftrag}</div>
                                        </div>
                                        <div className="flex-1 flex flex-col mt-2">
                                            <div className="text-[9px] text-amber-600 uppercase tracking-widest font-bold mb-1.5 font-mono">Extrahierte Rohdaten (Deep Crawl):</div>
                                            <div className="bg-white border border-amber-200/50 p-4 rounded-2xl shadow-inner max-h-[60vh] overflow-y-auto">
                                                <pre className="text-[11px] font-mono whitespace-pre-wrap break-words text-slate-700 leading-relaxed">{helferArchiv.rohdaten}</pre>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 flex items-center justify-center text-amber-700/50 text-xs font-mono font-bold uppercase text-center p-12 border-2 border-dashed border-amber-200 rounded-3xl bg-amber-50/30 mt-8">
                                        Keine aktuellen Helfer-Notizen vorhanden.
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* --- PIPELINE MAPPING VIEW --- */}
                        <div className={`${activeView === 'pipeline' ? 'block' : 'hidden'} p-4 sm:p-6 max-w-4xl mx-auto space-y-6 mt-4 animate-fade-in w-full pb-20`}>
                            <div className="flex justify-between items-center border-b border-stone-200 pb-2">
                                <h2 className="text-sm font-bold uppercase tracking-widest text-slate-800">Pipeline Routing (Agent 1 ➔ Agent 2)</h2>
                                <button onClick={() => setPipelineMapping([...pipelineMapping, { id: generateId(), jsonKey: '', displayName: '' }])} className="btn-primary">➕ Feld hinzufügen</button>
                            </div>
                            <p className="text-xs text-slate-500">Definiere hier, welche Daten aus dem Kernel-JSON (Agent 1) extrahiert und in lesbarer Form als Direktive an die Persona (Agent 2) gesendet werden sollen. Nutze die Punkt-Notation für das JSON-Feld (z.B. <code>matrix.situations_analyse</code>).</p>
                            
                            <div className="space-y-3">
                                {pipelineMapping.map((item, index) => (
                                    <div key={item.id} className="panel flex flex-col sm:flex-row gap-3 items-start sm:items-end bg-white border-stone-200 shadow-sm">
                                        <div className="flex-1 w-full">
                                            <label className="label text-indigo-600">JSON-Key (Pfad)</label>
                                            <input value={item.jsonKey} onChange={(e) => {
                                                const newMap = [...pipelineMapping]; newMap[index].jsonKey = e.target.value; setPipelineMapping(newMap);
                                            }} className="input-field border-indigo-100" placeholder="z.B. matrix.situations_analyse" />
                                        </div>
                                        <div className="flex-1 w-full">
                                            <label className="label text-fuchsia-600">Klarname für Agent 2</label>
                                            <input value={item.displayName} onChange={(e) => {
                                                const newMap = [...pipelineMapping]; newMap[index].displayName = e.target.value; setPipelineMapping(newMap);
                                            }} className="input-field border-fuchsia-100" placeholder="z.B. Befehl" />
                                        </div>
                                        <button onClick={() => setPipelineMapping(pipelineMapping.filter(p => p.id !== item.id))} className="btn-danger w-full sm:w-auto h-[42px] px-4">🗑️ Entfernen</button>
                                    </div>
                                ))}
                                {pipelineMapping.length === 0 && <div className="text-center text-slate-400 text-xs py-8">Alle Felder werden blockiert. Agent 2 erhält nur den User-Input.</div>}
                            </div>
                        </div>

                        {/* --- V5.1 SETTINGS VIEW (DUAL PROVIDER) --- */}
                        <div className={`${activeView === 'settings' ? 'block' : 'hidden'} p-4 sm:p-6 w-full max-w-4xl mx-auto space-y-6 mt-4 animate-fade-in pb-20`}>
                            <div className="flex justify-between items-center border-b border-stone-200 pb-2">
                                <h2 className="text-sm font-bold uppercase tracking-widest text-slate-800">System Konfiguration</h2>
                            </div>
                            
                            <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar w-full">
                                <button onClick={()=>setSettingsTab('chat')} className={`btn font-bold px-4 py-2 text-xs shrink-0 ${settingsTab==='chat'?'bg-indigo-100 text-indigo-800 border-indigo-200':'bg-stone-50 text-slate-500'}`}>💬 CHAT</button>
                                <button onClick={()=>setSettingsTab('audio')} className={`btn font-bold px-4 py-2 text-xs shrink-0 ${settingsTab==='audio'?'bg-fuchsia-100 text-fuchsia-800 border-fuchsia-200':'bg-stone-50 text-slate-500'}`}>🔈 AUDIO</button>
                                <button onClick={()=>setSettingsTab('agenten')} className={`btn font-bold px-4 py-2 text-xs shrink-0 ${settingsTab==='agenten'?'bg-emerald-100 text-emerald-800 border-emerald-200':'bg-stone-50 text-slate-500'}`}>🤖 AGENTEN</button>
                                <button onClick={()=>setSettingsTab('backup')} className={`btn font-bold px-4 py-2 text-xs shrink-0 ${settingsTab==='backup'?'bg-slate-800 text-white border-slate-700':'bg-stone-50 text-slate-500'}`}>💾 BACKUP</button>
                            </div>
                            
                            {settingsTab === 'chat' && (
                                <div className="space-y-6 animate-fade-in w-full">
                                    <div className="panel space-y-4 w-full">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label className="label">🧠 Agent 1 (Kernel & JSON-Routing)</label>
                                                <select value={activeKernelProviderId} onChange={(e) => { setActiveKernelProviderId(e.target.value); localStorage.setItem('lumen_activeKernelProviderId', e.target.value); showToast('Kernel-Provider gewechselt'); }} className="input-field font-sans text-xs font-bold text-indigo-700">
                                                    {providers.map(p => <option key={p.id} value={p.id}>{p.name} ({p.type})</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="label">🎭 Agent 2 (Persona & Übersetzung)</label>
                                                <select value={activePersonaProviderId} onChange={(e) => { setActivePersonaProviderId(e.target.value); localStorage.setItem('lumen_activePersonaProviderId', e.target.value); showToast('Persona-Provider gewechselt'); }} className="input-field font-sans text-xs font-bold text-fuchsia-700">
                                                    {providers.map(p => <option key={p.id} value={p.id}>{p.name} ({p.type})</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-3 w-full">
                                        {providers.map(p => (
                                            <div key={p.id} className="panel flex flex-col gap-2 border-stone-200 bg-white shadow-sm w-full">
                                                <div className="flex justify-between items-start">
                                                    <div className="flex-1 pr-4 min-w-0">
                                                        <div className="font-bold text-sm text-slate-800 truncate">{p.name} <span className="badge ml-2 bg-stone-100 text-stone-500 border-stone-200">{p.type}</span>{p.jsonMode !== false && <span className="badge ml-1 bg-indigo-50 text-indigo-500 border-indigo-100" title="JSON Mode aktiv">JSON</span>}</div>
                                                        <div className="text-[10px] text-slate-400 font-mono mt-1 break-words block">{p.url}</div>
                                                        <div className="text-[10px] text-indigo-500 font-mono mt-0.5 font-bold">Max Tokens: {p.maxTokens || 8000}</div>
                                                    </div>
                                                    <div className="flex gap-1 shrink-0">
                                                        <button onClick={() => { setEditProviderId(p.id); setProviderForm({...p, jsonMode: p.jsonMode !== false, maxTokens: p.maxTokens || 8000}); }} className="btn py-1 px-2">✏️</button>
                                                        <button onClick={() => { if(window.confirm('Chat-Provider löschen?')) { const newList = providers.filter(x=>x.id!==p.id); setProviders(newList); localStorage.setItem('lumen_providers', JSON.stringify(newList)); if(activeKernelProviderId===p.id && newList.length) { setActiveKernelProviderId(newList[0].id); localStorage.setItem('lumen_activeKernelProviderId', newList[0].id); } if(activePersonaProviderId===p.id && newList.length) { setActivePersonaProviderId(newList[0].id); localStorage.setItem('lumen_activePersonaProviderId', newList[0].id); } } }} className="btn py-1 px-2 hover:text-rose-600">🗑️</button>
                                                    </div>
                                                </div>
                                                {p.apiKey ? <div className="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded w-max mt-1">✓ API Key hinterlegt</div> : <div className="text-[10px] font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded w-max mt-1">⚠️ Kein Key hinterlegt</div>}
                                            </div>
                                        ))}
                                        <div className="panel border-indigo-200 bg-indigo-50/30 flex flex-col gap-3 shadow-sm mt-4 w-full">
                                            <h3 className="font-bold text-xs uppercase tracking-widest text-indigo-800">{editProviderId ? 'Chat-Provider bearbeiten' : 'Neuen Chat-Provider anlegen'}</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
                                                <div className="min-w-0"><label className="label text-indigo-600">Anzeigename</label><input value={providerForm.name} onChange={e=>setProviderForm({...providerForm, name: e.target.value})} className="input-field bg-white border-indigo-100" placeholder="z.B. GPT-4o" /></div>
                                                <div className="min-w-0"><label className="label text-indigo-600">API Format (Payload)</label><select value={providerForm.type} onChange={e=>setProviderForm({...providerForm, type: e.target.value})} className="input-field bg-white border-indigo-100"><option value="gemini">Google Gemini Format</option><option value="openai">OpenAI Format (GPT, LM Studio, etc.)</option></select></div>
                                            </div>
                                            <div className="w-full min-w-0"><label className="label text-indigo-600">API Endpoint URL</label><input value={providerForm.url} onChange={e=>setProviderForm({...providerForm, url: e.target.value})} className="input-field bg-white border-indigo-100" placeholder="z.B. https://api.openai.com/v1/chat/completions" /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full">
                                                <div className="min-w-0"><label className="label text-indigo-600">Modell-ID</label><input value={providerForm.model} onChange={e=>setProviderForm({...providerForm, model: e.target.value})} className="input-field bg-white border-indigo-100" placeholder="z.B. gpt-4o" disabled={providerForm.type === 'gemini'} /></div>
                                                <div className="min-w-0"><label className="label text-indigo-600">Token-Limit</label><input type="number" value={providerForm.maxTokens} onChange={e=>setProviderForm({...providerForm, maxTokens: Number(e.target.value)})} className="input-field bg-white border-indigo-100 font-bold text-indigo-700" placeholder="8000" /></div>
