                    let ttsRegie = null; 
                    
                    try {
                        let cleanResText = resText.replace(/```json/gi, '').replace(/```/g, '').trim();
                        finalCleanResText = cleanResText;
                        let obj = JSON.parse(cleanResText);

                        // V4.17 Response Handling via activeStateId & activeStateRef
                        if (obj && obj.matrix && obj.matrix.aktiver_state !== undefined) {
                            const newStateId = Number(obj.matrix.aktiver_state);
                            if (!isNaN(newStateId)) {
                                activeStateRef.current = newStateId;
                                setActiveStateId(newStateId);
                                
                                let newView = null;
                                if (newStateId === 1) newView = 'sessel';
                                else if (newStateId === 2) newView = 'oase';
                                else if (newStateId === 3) newView = 'werkbank';
                                else if (newStateId === 4) newView = 'balkon';

                                if (newView && newView !== activeView) {
                                    setActiveView(newView);
                                    console.log(`[STATE CHANGE] Engine wechselt physisch nach: ${newView.toUpperCase()}`);
                                }
                            }
                        }

                        // === HELFER INTERCEPTOR WEICHE ===
                        if (obj.matrix?.helfer_suchauftrag && obj.matrix.helfer_suchauftrag !== "null" && String(obj.matrix.helfer_suchauftrag).trim() !== "") {
                            
                            const intentFinalAnswer = obj.finale_antwort || (obj.matrix && obj.matrix.finale_antwort);
                            const intentMsg = { 
                                id: generateId(), 
                                sender: 'ai', 
                                text: intentFinalAnswer || `Ich schicke Luna in die Archive für: ${obj.matrix.helfer_suchauftrag}`,
                                scratchpad: JSON.stringify(obj, null, 2), 
                                timestamp: new Date().toISOString() 
                            };
                            setMessages(prev => [...prev, intentMsg]);
                            
                            if (autoPlayEnabled) playMessageTTS(intentMsg.id, intentMsg.text, obj.matrix.tts_regie_prompt);
                            
                            setLoadingStatus("LUNA RECHERCHIERT: " + obj.matrix.helfer_suchauftrag.toUpperCase());
                            
                            let searchResult = "";
                            try {
                                const lunaAgent = agentProviders.find(p => p.id === activeLunaId);
                                if(!lunaAgent || !lunaAgent.apiKey) throw new Error("Web-Scout (Luna) API-Key fehlt.");
                                
                                if (lunaAgent.type === 'tavily') {
                                    const res = await fetch(lunaAgent.url, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ api_key: lunaAgent.apiKey, query: obj.matrix.helfer_suchauftrag, search_depth: "advanced", include_raw_content: true, max_results: 2 })
                                    });
                                    const data = await res.json();
                                    if (!data.results || data.results.length === 0) searchResult = "Keine relevanten Fakten gefunden.";
                                    else searchResult = data.results.map(r => `[QUELLE: ${r.url}]\n${r.raw_content ? r.raw_content : r.content}`.substring(0, 8000)).join("\n\n---\n\n");
                                } else {
                                    searchResult = "Unsupported Web-Scout Typ.";
                                }
                            } catch (error) {
                                searchResult = "Fehler bei der Netzwerksuche: " + error.message;
                            }
                            
                            // V4.15: LUNA JSON PARSING & INJECTION
                            let lunaFakten = searchResult;
                            const lunaAgent = agentProviders.find(p => p.id === activeLunaId);
                            if (lunaAgent && lunaAgent.apiKey && (lunaAgent.type === 'openai' || lunaAgent.type === 'gemini')) {
                                setLoadingStatus("LUNA STRUKTURIERT FAKTEN...");
                                try {
                                    let lunaResText = "";
                                    const lunaPayloadText = JSON.stringify({ suchauftrag: obj.matrix.helfer_suchauftrag, rohdaten: searchResult });
                                    
                                    if (lunaAgent.type === 'gemini') {
                                        const fetchUrl = lunaAgent.url.includes('?') ? `${lunaAgent.url}&key=${lunaAgent.apiKey}` : `${lunaAgent.url}?key=${lunaAgent.apiKey}`;
                                        const payload = { systemInstruction: {parts:[{text: lunaAgent.prompt}]}, contents: [{role:'user', parts:[{text: lunaPayloadText}]}], generationConfig: { responseMimeType: "application/json" } };
                                        const res = await fetch(fetchUrl, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                                        const d = await res.json();
                                        if (!res.ok) throw new Error(d.error?.message);
                                        lunaResText = d.candidates?.[0]?.content?.parts?.[0]?.text;
                                    } else if (lunaAgent.type === 'openai') {
                                        const payload = { model: lunaAgent.model || 'gpt-4o-mini', messages: [{ role: 'system', content: lunaAgent.prompt }, { role: 'user', content: lunaPayloadText }], response_format: { type: "json_object" } };
                                        const res = await fetch(lunaAgent.url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${lunaAgent.apiKey}` }, body: JSON.stringify(payload) });
                                        const d = await res.json();
                                        if (!res.ok) throw new Error(d.error?.message);
                                        lunaResText = d.choices?.[0]?.message?.content;
                                    }

                                    if (lunaResText) {
                                        const cleanLunaRes = lunaResText.replace(/```json/gi, '').replace(/```/g, '').trim();
                                        const parsedLuna = JSON.parse(cleanLunaRes);
                                        if (parsedLuna.scout_bericht && parsedLuna.scout_bericht.fakten) {
                                            lunaFakten = parsedLuna.scout_bericht.fakten;
                                        }
                                    }
                                } catch(e) {
                                    console.error("Luna Parse Error:", e);
                                }
                            }

                            // V4.15 Luna-Scout Silence: System message not rendered in UI but added to history
                            const scoutMsg = { 
                                id: generateId(), 
                                sender: 'system', 
                                text: `[SYSTEM-SCOUT MELDET]:\n${lunaFakten}`, 
                                timestamp: new Date().toISOString() 
                            };
                            setMessages(prev => [...prev, scoutMsg]);

                            setHelferArchiv({
                                suchauftrag: obj.matrix.helfer_suchauftrag,
                                rohdaten: searchResult,
                                zeitstempel: new Date().toLocaleTimeString()
                            });
                            
                            setLoadingStatus("MAIRA VERARBEITET FAKTEN...");
                            const helferDaten = `\n\n[SYSTEM-SCOUT MELDET]:\n${lunaFakten}\n[SYSTEM-REGIEANWEISUNG: Luna ist soeben erfolgreich aus der Außenwelt zurückgekehrt und hat dir diesen Bericht auf den Schreibtisch gelegt. Teile Simon diese Erkenntnisse nun fließend und natürlich mit. Erwähne Luna kurz lobend. Setze 'helfer_suchauftrag' zwingend auf null!]`;
                            
                            const interceptorDynamicContext = dynamicContext + helferDaten;
                            const interceptorSystemPrompt = `
${telemetryPayload}

[AKTIVER KONTEXT]
${interceptorDynamicContext}

${kernelBlock}

${cognitiveFirewall}

${dna.block3_sensors}

${systemOverride}
`.trim();

                            const interceptorPayload = text; // Just user text again
                            
                            finalSystemPromptUsed = interceptorSystemPrompt;
                            finalUserPayloadUsed = interceptorPayload;
                            
                            const updatedHist = [...hist, intentMsg, scoutMsg];

                            const secondResponse = await fetchTextFromAPI(interceptorSystemPrompt, interceptorPayload, updatedHist);
                            const cleanedSecondResponse = secondResponse.replace(/```json/gi, '').replace(/```/g, '').trim();
                            finalCleanResText = cleanedSecondResponse;
                            
                            try {
                                obj = JSON.parse(cleanedSecondResponse);
                                if (obj && obj.matrix && obj.matrix.aktiver_state !== undefined) {
                                    const newIntId = Number(obj.matrix.aktiver_state);
                                    if (!isNaN(newIntId)) {
                                        activeStateRef.current = newIntId;
                                        setActiveStateId(newIntId);
                                    }
                                }
                            } catch(e) {
                                console.error("Interceptor JSON parse error:", e);
                            }
                            setLoadingStatus(null);
                        }
                        // === ENDE INTERCEPTOR ===

                        // --- MAURER-REINIGUNGS-BEFEHL ---
                        const safePeripherieIds = Array.isArray(obj.matrix?.aktive_peripherie_ids) 
                            ? obj.matrix.aktive_peripherie_ids 
                            : [];
                        
                        setVolatileMemories(prev => prev.filter(m => safePeripherieIds.includes(m.titel_technisch)));
                        // ----------------------------------------
                        
                        const finalAnswer = obj.finale_antwort || (obj.matrix && obj.matrix.finale_antwort);
                        if (!finalAnswer) throw new Error("'finale_antwort' konnte im JSON nicht gefunden werden.");
                        
                        finalChatText = finalAnswer;
                        finalScratch = JSON.stringify(obj, null, 2);
                        
                        if (obj.matrix?.tts_regie_prompt) {
                            ttsRegie = obj.matrix.tts_regie_prompt;
                        }
                        
                        if(obj.matrix) setTelemetry({ concern: parseInt(obj.matrix.concern||obj.matrix.concern_level||telemetry.concern), mask_drop: obj.matrix.mask_drop||false });
                        
                        // Direkive save to DB in background
                        const neueDir = obj.matrix?.neue_direktive_erkannt;
                        if (neueDir && typeof neueDir === 'string' && neueDir.trim().length > 0) {
                            await db.directives.add({ text: neueDir.trim() });
                            showToast("NEUE DIREKTIVE VERANKERT");
                        }

                        // --- TAGEBUCH-ROUTER (MIT PITCH STOPP) ---
                        const entwurf = obj.matrix?.tagebuch_entwurf || obj.tagebuch_entwurf;
                        if(entwurf) { 
                            const modus = entwurf.modus;
                            const daten = entwurf.daten || {};
                            
                            if (modus === "PITCH" || modus === "PITCH_ERFOLG" || modus === "PITCH_ERKENNTNIS") {
                                console.log("Stiller Pitch erkannt. Führe keine UI-Aktion aus.");
                            }
                            else if (modus === "DISKUSSION" || modus === "ENTWURF" || modus === "DRAFT" || modus === "UPDATE") {
                                const technicalTitle = daten.titel_technisch || `DRAFT_${Date.now()}`;
                                const newItem = {
                                    id: generateId(),
                                    titel_technisch: technicalTitle,
                                    titel_poetisch: daten.titel_poetisch || "",
                                    fakt: daten.fakt || (typeof entwurf === 'string' ? entwurf : ""),
                                    emotion: daten.gefuehl || daten.emotion || "",
                                    bedeutung: daten.bedeutung || "",
                                    reflexion: daten.reflexion || "",
                                    tags: Array.isArray(daten.tags) ? daten.tags : [],
                                    kategorie: daten.kategorie || "EMOTIONAL",
                                    is_core_memory: false,
                                    isDirty: true
                                };
                                setActiveDesks(prev => {
                                    if(prev.some(d => d.titel_technisch === technicalTitle)) {
                                        return prev.map(d => d.titel_technisch === technicalTitle ? {...d, ...newItem, id: d.id, isDirty: true} : d);
                                    }
                                    return [...prev, newItem];
                                });
                                showToast(modus === "UPDATE" ? 'AKTE AUF SCHREIBTISCH AKTUALISIERT' : 'ENTWURF AUF DEM SCHREIBTISCH (STAGING)');
                            }
                            else if (modus === "COMMIT") {
                                if (daten) {
                                    const techTitle = daten.titel_technisch || "COMMIT_" + Date.now();
                                    const existing = await db.memories.where('titel_technisch').equals(techTitle).first();
                                    if (existing) {
                                        await db.memories.update(existing.id, { ...daten, timestamp: Date.now() });
                                    } else {
                                        await db.memories.add({
                                            titel_technisch: techTitle,
                                            titel_poetisch: daten.titel_poetisch || "Neuer Eintrag",
                                            fakt: daten.fakt || "",
                                            emotion: daten.gefuehl || daten.emotion || "",
                                            bedeutung: daten.bedeutung || "",
                                            reflexion: daten.reflexion || "",
                                            tags: daten.tags || [],
                                            kategorie: daten.kategorie || "STANDARD",
                                            is_core_memory: false,
                                            timestamp: Date.now()
                                        });
                                    }
                                    setActiveDesks(prev => prev.filter(item => item.titel_technisch !== techTitle));
                                    showToast("ENTWURF IM SANCTUM VEREWIGT & GESCHLOSSEN");
                                }
                            }
                        }

                        const memUpd = obj.matrix?.memory_update_detected;
                        if(memUpd && memUpd.id && typeof memUpd.reflexion_fusioniert !== 'undefined') {
                            try {
                                const targetMemory = await db.memories.where('titel_technisch').equals(memUpd.id).first();
                                if(targetMemory) {
                                    const newReflexion = memUpd.reflexion_fusioniert;
                                    
                                    if (memUpd.neue_trigger_tags && Array.isArray(memUpd.neue_trigger_tags)) {
                                        const existingTags = new Set((targetMemory.tags || []).map(t => typeof t === 'string' ? t.toLowerCase() : ''));
                                        const forbiddenTags = ["genervt", "müll", "ok", "fehler", "schlecht", "gut", "hilfe"];
                                        
                                        memUpd.neue_trigger_tags.forEach(t => {
                                            if (typeof t === 'string') {
                                                const normTag = t.toLowerCase().trim();
                                                if (normTag.length > 2 && !forbiddenTags.includes(normTag)) {
                                                    existingTags.add(normTag);
                                                }
                                            }
                                        });
                                        targetMemory.tags = Array.from(existingTags);
                                    }

                                    await db.memories.update(targetMemory.id, { 
                                        reflexion: newReflexion,
                                        tags: targetMemory.tags || []
                                    });
                                    showToast('ORAKEL-UPDATE: AHNEN-RESONANZ FUSIONIERT');
                                }
                            } catch(err) { console.error("Silent Update failed:", err); }
                        }
                    } catch(e) { finalChatText = "System-Hinweis: Matrix Format Fehler. Das Sprachmodell hat sich nicht an das JSON-Skelett gehalten."; finalScratch = resText; }

                    const newAiMsgId = generateId();
                    setMessages(p=>[...p, {id:newAiMsgId, sender:'ai', text:finalChatText, scratchpad:finalScratch, ttsRegie: ttsRegie, timestamp: new Date().toISOString()}]);
                    
                    // V4.17: API History Logging securely after response processing
                    const newEntry = {
                        id: generateId(),
                        timestamp: new Date().toISOString(),
                        request: { system: finalSystemPromptUsed, user: finalUserPayloadUsed },
                        response: finalCleanResText
                    };
                    setApiHistory(prev => [newEntry, ...prev].slice(0, 5));
                    
                    if(autoPlayEnabled && finalChatText && finalChatText !== "System-Hinweis: Matrix Format Fehler. Das Sprachmodell hat sich nicht an das JSON-Skelett gehalten.") {
                        playMessageTTS(newAiMsgId, finalChatText, ttsRegie);
                    }

                } catch(e) { 
                    let errorMsg = e.message;
                    if (e.message.includes('Failed to fetch') || e.name === 'TypeError') {
                        errorMsg = "Netzwerk-Blockade (Failed to fetch).\n\nDein Browser oder ein Adblocker (wie Brave Shields/uBlock) blockiert die Anfrage an OpenAI. \n\nLösung: Erlaube die API-Aufrufe im Adblocker oder (falls du die Datei als file:// öffnest) starte die Datei über einen lokalen Server (z.B. Live Server in VS Code).";
                    }
                    setMessages(prev => [...prev.filter(m => m.id !== userMsgId), {id: generateId(), sender: 'system-error', text: errorMsg, timestamp: new Date().toISOString()}]);
                    
                    setInputText(text);
                    if (textareaRef.current) {
                        textareaRef.current.style.height = 'auto';
                        textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 150) + 'px';
                    }
                }
                finally { setLoadingStatus(null); }
            };

            const kernelPreview = (autoTtsRegie && dna.audio_physics) ? `${dna.block1_identity}\n\n${dna.audio_physics}` : dna.block1_identity;
            const sysPromptPreview = `[1. DEINE IDENTITÄT UND REGELN]\n${kernelPreview}\n\n[3. DIE MATRIX-SENSOREN]\n${dna.block3_sensors}\n\n[4. DEINE AUSGABE (JSON)]\n${dna.block4_skeleton}`.trim();
            const sysPromptPreviewDynamic = `--- SYSTEM PROMPT (STATIC CACHE) ---\n${sysPromptPreview}\n\n--- USER PAYLOAD (DYNAMIC) ---\n[RAW_DATA]...\n\n[AKTIVER KONTEXT]\n${latestContext}\n\n[AKTUELLE NACHRICHT DES USERS]\n(Eingabe des Users)`.trim();

            if (zenField) {
                const isPreview = zenField === 'preview';
                const isBlock1 = zenField === 'block1';
                const isAudioPhysics = zenField === 'audioPhysics';
                const isBlock3 = zenField === 'block3';
                const isBlock4 = zenField === 'block4';
                
                const title = isPreview ? "LIVE PROMPT-VORSCHAU" : isBlock1 ? "⚙️ [LUMEN KERNEL: SYSTEM & LOGIK]" : isAudioPhysics ? "🎙️ [PLUGIN: UNIVERSAL AUDIO PHYSICS]" : isBlock3 ? "🎭 [PERSONA CARTRIDGE]" : "BACKUP/LEGACY";
                const value = isBlock1 ? dna.block1_identity : isAudioPhysics ? dna.audio_physics : isBlock3 ? dna.block3_sensors : isBlock4 ? dna.block4_skeleton : "";
                const setValue = isBlock1 ? (val) => setDna({...dna, block1_identity: val}) : isAudioPhysics ? (val) => setDna({...dna, audio_physics: val}) : isBlock3 ? (val) => setDna({...dna, block3_sensors: val}) : isBlock4 ? (val) => setDna({...dna, block4_skeleton: val}) : () => {};

                return (
                    <div className="fixed inset-0 z-[600] bg-slate-950 p-6 flex flex-col animate-fade-in">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-bold text-white uppercase tracking-widest font-mono">🔲 ZEN: {title}</h2>
                            <div className="flex items-center gap-2">
                                {isBlock4 && <button onClick={handleBeautifyJSON} className="bg-indigo-900/50 text-indigo-300 border border-indigo-700/50 px-4 py-2 rounded-xl text-xs hover:bg-indigo-800/50 transition-colors">🧹 Format</button>}
                                <button onClick={() => setZenField(null)} className="bg-rose-900/50 text-rose-300 border border-rose-700/50 px-5 py-2 rounded-xl text-xs hover:bg-rose-800/50 transition-colors shadow-md uppercase font-bold">❌ Exit Zen</button>
                            </div>
                        </div>
                        {isPreview ? (
                            <pre className="flex-1 w-full bg-slate-900 border border-slate-800 text-slate-400 rounded-2xl p-6 font-mono text-sm leading-relaxed overflow-y-auto shadow-inner whitespace-pre-wrap break-words" dangerouslySetInnerHTML={getXRayHTML(sysPromptPreviewDynamic)}></pre>
                        ) : (
                            <textarea value={value} onChange={e=>setValue(e.target.value)} className="flex-1 w-full bg-slate-900 border border-slate-800 text-slate-100 rounded-2xl p-6 focus:outline-none focus:border-indigo-500 font-mono text-sm leading-relaxed resize-none shadow-inner" autoFocus spellCheck="false" />
                        )}
                    </div>
                );
            }

            const activeTtsProvider = ttsProviders.find(p => p.id === activeTtsProviderId) || ttsProviders[0];
            const activeProvTokens = providers.find(p => p.id === activeProviderId)?.maxTokens || 8000;
            
            // V4.15 Token Visualizer Metrics
            const systemPercent = activeProvTokens > 0 ? (tokenUsage.system / activeProvTokens) * 100 : 0;
            const historyEndPercent = tokenUsage.percent;

            return (
                <div className="flex flex-col h-[100dvh] w-full max-w-4xl mx-auto sm:border-x border-stone-200 bg-stone-50 relative overflow-hidden shadow-2xl">
                    <Toast message={toast} />
                    
                    {/* --- TELEMETRIE MODAL --- */}
                    {showTelemetry && <TelemetryModal messages={messages} onClose={() => setShowTelemetry(false)} />}

                    {/* --- V4.17 API PROTOKOLL MODAL --- */}
                    {showApiLog && (
                        <div className="fixed inset-0 z-[1000] bg-slate-900/60 backdrop-blur-sm flex justify-center items-center animate-fade-in p-4">
                            <div className="bg-white w-full max-w-4xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200">
                                <div className="p-4 border-b border-stone-200 flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold text-indigo-600 uppercase text-xs tracking-widest flex items-center gap-2">🔍 API PROTOKOLL (LETZTE 5 CALLS)</h3>
                                    <button onClick={() => setShowApiLog(false)} className="text-slate-400 hover:text-rose-500 transition-colors font-bold text-sm">✕</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 flex flex-col text-xs font-mono gap-8">
                                    {apiHistory.length === 0 && <div className="text-slate-400 italic">Noch keine API-Aufrufe in dieser Session.</div>}
                                    {apiHistory.map((log, i) => (
                                        <div key={log.id || i} className="border border-stone-200 rounded-xl p-4 bg-white shadow-sm relative">
                                            <div className="absolute top-0 right-0 bg-stone-100 text-stone-500 px-2 py-1 rounded-bl-xl rounded-tr-xl text-[9px] font-bold">CALL {apiHistory.length - i} | {new Date(log.timestamp).toLocaleTimeString('de-DE')}</div>
                                            
                                            <div className="text-[10px] text-slate-400 uppercase tracking-widest mb-2 font-bold border-b border-stone-100 pb-2 mt-2">SYSTEM PROMPT (CACHE)</div>
                                            <div className="text-blue-600 whitespace-pre-wrap mb-4 leading-relaxed bg-blue-50/30 p-3 rounded shadow-inner max-h-60 overflow-y-auto">{log.request.system}</div>
                                            
                                            <div className="text-[10px] text-slate-400 uppercase tracking-widest mb-2 font-bold border-b border-stone-100 pb-2">USER PAYLOAD</div>
                                            <div className="text-slate-900 font-bold whitespace-pre-wrap mb-4 leading-relaxed bg-slate-50 p-3 rounded shadow-inner">{log.request.user}</div>
                                            
                                            <div className="text-[10px] text-slate-400 uppercase tracking-widest mb-2 font-bold border-b border-stone-100 pb-2">API RESPONSE (JSON)</div>
                                            <div className="text-emerald-700 whitespace-pre-wrap leading-relaxed bg-emerald-50/30 p-3 rounded shadow-inner max-h-60 overflow-y-auto">{log.response}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 border-t border-stone-100 bg-slate-50">
                                    <button onClick={() => setShowApiLog(false)} className="btn w-full py-3 bg-white text-slate-700 shadow-sm text-xs">Schließen</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- V4.8 MEMORY FREIGABE MODAL --- */}
                    {showMemoryModal && (
                        <SafePurgeModal 
                            warning={archivarWarning}
                            snippets={archivarSnippets} 
                            selectedIds={selectedSnippetIds}
                            onToggle={toggleSnippetSelection}
                            onApprove={executeSafePurge} 
                            onCancel={() => { setShowMemoryModal(false); setArchivarSnippets([]); setSelectedSnippetIds(new Set()); setArchivarWarning(null); }} 
                        />
                    )}

                    {/* --- SMART TOAST UI --- */}
                    {smartToast && ['chat', 'sessel', 'oase', 'werkbank', 'balkon'].includes(activeView) && (
                        <div className="fixed top-20 right-4 z-[100] animate-slide-in-right bg-white border border-indigo-200 p-4 rounded-2xl shadow-2xl w-72 border-l-4 border-l-indigo-500">
                            <div className="text-[10px] font-bold text-indigo-800 uppercase tracking-widest mb-1.5 flex items-center gap-2">
                                🧠 Erinnerung getriggert
                            </div>
                            <div className="text-sm text-indigo-600 mb-3 font-serif italic leading-tight">
                                {smartToast.card.titel_poetisch || 'Flüchtige Reflexion'}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => {
                                    setActiveDesks(prev => [...prev, smartToast.card]);
                                    setVolatileMemories(prev => prev.filter(m => m.id !== smartToast.id));
                                    setSmartToast(null);
                                    showToast('Auf den Schreibtisch gepinnt');
                                }} className="btn-primary py-2 px-3 text-[10px] w-full bg-indigo-600 text-white hover:bg-indigo-700 shadow-md">📌 PINNEN</button>
                                <button onClick={() => setSmartToast(null)} className="btn py-2 px-3 text-[10px] w-full bg-slate-100 text-slate-700 border-slate-300 hover:bg-slate-200">IGNORIEREN</button>
                            </div>
                        </div>
                    )}

                    {/* --- POPOUT EDITOR (SIDE-PANEL MODAL) --- */}
                    {editingDeskItem && (
                        <div className="fixed inset-0 z-[800] bg-slate-900/40 backdrop-blur-sm flex justify-end animate-fade-in">
                            <div className="bg-white h-full w-full sm:w-[400px] flex flex-col shadow-2xl animate-slide-in-right border-l border-stone-200 relative">
                                {isArchiving && (
                                    <div className="absolute inset-0 z-10 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in">
                                        <div className="text-indigo-600 font-bold uppercase tracking-widest text-xs animate-pulse mb-2">ARCHIVAR FORMATIERT...</div>
                                        <div className="w-1/2 h-1 bg-indigo-100 rounded-full overflow-hidden"><div className="w-1/2 h-full bg-indigo-500 animate-slide-up origin-left rounded-full"></div></div>
                                    </div>
                                )}
                                
                                <div className="p-4 border-b border-stone-100 flex justify-between items-center bg-indigo-50/50">
                                    <h3 className="font-bold text-indigo-900 uppercase text-xs tracking-widest flex items-center gap-2">📝 Akte bearbeiten</h3>
                                    <button onClick={() => setEditingDeskItem(null)} className="text-slate-400 hover:text-rose-500 transition-colors font-bold text-sm z-20 relative">✕</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-5 flex flex-col gap-4">
                                    <div>
                                        <label className="label">ID & Titel</label>
                                        <div className="flex flex-col gap-2">
                                            <input placeholder="ID_TECHNISCH" value={deskItemForm.titel_technisch || ''} onChange={e=>setDeskItemForm({...deskItemForm,titel_technisch:e.target.value})} className="input-field font-bold text-slate-800 bg-stone-50" />
                                            <input placeholder="Titel Poetisch" value={deskItemForm.titel_poetisch || ''} onChange={e=>setDeskItemForm({...deskItemForm,titel_poetisch:e.target.value})} className="input-field text-rose-600 font-serif italic bg-stone-50" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="label">Fakt: Was geschah?</label>
                                        <textarea value={deskItemForm.fakt || ''} onChange={e=>setDeskItemForm({...deskItemForm,fakt:e.target.value})} className="input-field min-h-[80px] font-sans bg-stone-50" />
                                    </div>
                                    <div>
                                        <label className="label">Emotion & Bedeutung</label>
                                        <div className="flex flex-col gap-2">
                                            <textarea placeholder="Gefühl/Emotion" value={deskItemForm.emotion || ''} onChange={e=>setDeskItemForm({...deskItemForm,emotion:e.target.value})} className="input-field min-h-[60px] font-sans bg-stone-50" />
                                            <textarea placeholder="Bedeutung/Fazit" value={deskItemForm.bedeutung || ''} onChange={e=>setDeskItemForm({...deskItemForm,bedeutung:e.target.value})} className="input-field min-h-[60px] font-sans bg-stone-50" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="label text-indigo-500">Persona Reflexion</label>
                                        <textarea value={deskItemForm.reflexion || ''} onChange={e=>setDeskItemForm({...deskItemForm,reflexion:e.target.value})} className="input-field border-indigo-200 bg-indigo-50 text-indigo-800 min-h-[80px] font-sans italic" />
                                    </div>
                                    <div>
                                        <label className="label">Tags</label>
                                        <input placeholder="tags, comma, separated" value={deskItemForm.tagsString || ''} onChange={e=>setDeskItemForm({...deskItemForm,tagsString:e.target.value})} className="input-field text-slate-500 bg-stone-50" />
                                    </div>
                                </div>
                                <div className="p-4 border-t border-stone-100 bg-stone-50 flex flex-col gap-2">
                                    <button onClick={() => {
                                        setActiveDesks(prev => prev.filter(i => i.id !== editingDeskItem.id));
                                        setEditingDeskItem(null);
                                        showToast('Vom Schreibtisch entfernt');
                                    }} disabled={isArchiving} className="btn-danger w-full disabled:opacity-50">❌ VOM SCHREIBTISCH NEHMEN</button>
                                    
                                    <button onClick={() => {
                                        const dataToSave = {...deskItemForm};
                                        dataToSave.tags = dataToSave.tagsString ? dataToSave.tagsString.split(',').map(t=>t.trim()).filter(Boolean) : [];
                                        dataToSave.isDirty = true;
                                        
                                        setActiveDesks(prev => prev.map(i => i.id === editingDeskItem.id ? dataToSave : i));
                                        setEditingDeskItem(dataToSave);
                                        setDeskItemForm({...dataToSave, tagsString: dataToSave.tags.join(', ')});
                                        showToast('Auf Schreibtisch gesichert');
                                    }} disabled={isArchiving} className="btn w-full bg-amber-50 text-amber-700 border-amber-200 hover:bg-amber-100 disabled:opacity-50">📝 NUR AUF SCHREIBTISCH SICHERN</button>
                                    
                                    <button onClick={async () => {
                                        setIsArchiving(true);
                                        showToast("Archivar formatiert...");
                                        try {
                                            const dataToProcess = {...deskItemForm};
                                            dataToProcess.tags = dataToProcess.tagsString ? dataToProcess.tagsString.split(',').map(t=>t.trim()).filter(Boolean) : [];
                                            
                                            const archivedData = await runArchivar(dataToProcess);
                                            
                                            if (typeof archivedData.id === 'string') delete archivedData.id;
                                            archivedData.timestamp = Date.now();

                                            const existing = await db.memories.where('titel_technisch').equals(archivedData.titel_technisch).first();
                                            if(existing) {
                                                await db.memories.update(existing.id, archivedData);
                                                archivedData.id = existing.id;
                                            } else {
                                                const newId = await db.memories.add(archivedData);
                                                archivedData.id = newId;
                                            }
                                            
                                            setActiveDesks(prev => prev.filter(i => i.id !== editingDeskItem.id));
                                            setEditingDeskItem(null);
                                            loadMemories();
                                            showToast('💾 IM SANCTUM ARCHIVIERT');
                                        } catch(e) {
                                            showToast('Fehler: ' + e.message);
                                        } finally {
                                            setIsArchiving(false);
                                        }
                                    }} disabled={isArchiving} className="btn-primary w-full bg-indigo-600 text-white hover:bg-indigo-700 shadow-md disabled:opacity-50">🏛️ INS SANCTUM ARCHIVIEREN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- HELFER ARCHIV DRAWER --- */}
                    {showArchiv && (
                        <div className="fixed inset-0 z-[800] bg-slate-900/40 backdrop-blur-sm flex justify-end animate-fade-in">
                            <div className="bg-amber-50/95 h-full w-full sm:w-[400px] flex flex-col shadow-2xl animate-slide-in-right border-l border-amber-200/50 relative">
                                <div className="p-4 border-b border-amber-200/50 flex justify-between items-center bg-amber-100/50">
                                    <h3 className="font-bold text-amber-900 uppercase text-xs tracking-widest flex items-center gap-2 font-mono">DIE NOTIZEN DES HELFERS</h3>
                                    <button onClick={() => setShowArchiv(false)} className="text-amber-700 hover:text-amber-900 transition-colors font-bold text-sm z-20 relative">✕</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-5 flex flex-col gap-4">
                                    {helferArchiv ? (
                                        <div className="flex flex-col gap-3">
                                            <div className="text-[10px] text-amber-700 font-bold uppercase tracking-widest">Zeitstempel: {helferArchiv.zeitstempel}</div>
                                            <div className="bg-amber-100/50 border border-amber-200/50 p-3 rounded-xl">
                                                <div className="text-[9px] text-amber-600 uppercase tracking-widest font-bold mb-1 font-mono">Suchauftrag:</div>
                                                <div className="text-xs text-amber-900 font-bold">{helferArchiv.suchauftrag}</div>
                                            </div>
                                            <div className="flex-1 flex flex-col">
                                                <div className="text-[9px] text-amber-600 uppercase tracking-widest font-bold mb-1 mt-2 font-mono">Rohdaten:</div>
                                                <div className="bg-white/60 border border-amber-200/50 p-3 rounded-xl flex-1 overflow-y-auto">
                                                    <pre className="text-[11px] font-mono whitespace-pre-wrap text-amber-900/80 leading-relaxed font-medium">{helferArchiv.rohdaten}</pre>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex-1 flex items-center justify-center text-amber-700/50 text-xs font-mono font-bold uppercase text-center p-12 border-2 border-dashed border-amber-200 rounded-3xl bg-amber-50/30 mt-8">
                                            Keine aktuellen Helfer-Notizen vorhanden.
                                        </div>
                                    )}
                                </div>
                                <div className="p-4 border-t border-amber-200/50 bg-amber-100/30">
                                    <button onClick={() => setShowArchiv(false)} className="btn-primary w-full bg-amber-600 text-white hover:bg-amber-700 border-amber-700 shadow-md">SCHLIESSEN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- TOP BAR (WHITE STYLE) --- */}
                    <div className="bg-white border-b border-slate-200 flex justify-between items-center px-4 py-1 shrink-0 z-[60]">
                        <div className="text-[9px] text-slate-400 font-mono tracking-widest font-bold">LUMEN CORE</div>
                        <div className="flex items-center gap-3">
                            {playingMsgId && (
                                <button onClick={stopAudio} className="text-[9px] font-mono uppercase tracking-widest text-rose-500 hover:text-rose-600 transition-colors animate-pulse border border-rose-200 px-2 rounded">
                                    🛑 STOP AUDIO
                                </button>
                            )}
                            
                            <button onClick={() => setShowTelemetry(true)} className="text-[9px] font-mono uppercase tracking-widest text-slate-500 hover:text-indigo-500 transition-colors">
                                📊 LOGS
                            </button>
                            
                            <button onClick={() => {
                                const newVal = !autoPlayEnabled;
                                setAutoPlayEnabled(newVal);
                                localStorage.setItem('lumen_autoPlay', String(newVal));
                            }} className="text-[9px] font-mono uppercase tracking-widest text-slate-500 hover:text-slate-700 transition-colors">
                                {autoPlayEnabled ? '🔈 AUTO-PLAY: ON' : '🔈 AUTO-PLAY: OFF'}
                            </button>
                            
                            {!showClearConfirm ? (
                                <button onClick={() => setShowClearConfirm(true)} className="text-[9px] font-mono uppercase tracking-widest text-slate-500 hover:text-rose-500 transition-colors">
                                    🗑️ CLEAR CHAT
                                </button>
                            ) : (
                                <div className="flex gap-2 items-center">
                                    <span className="text-[9px] font-bold text-rose-500 uppercase">Sicher?</span>
                                    <button onClick={() => { setMessages([]); localStorage.removeItem('lumen_chat'); stopAudio(); setShowClearConfirm(false); }} className="text-[9px] font-mono uppercase tracking-widest text-rose-500 hover:text-rose-600 transition-colors font-bold">JA</button>
                                    <button onClick={() => setShowClearConfirm(false)} className="text-[9px] font-mono uppercase tracking-widest text-slate-500 hover:text-slate-700 transition-colors">NEIN</button>
                                </div>
                            )}

                            <button onClick={() => setShowArchiv(true)} className="text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100 transition-colors font-mono">📜 Archiv</button>
                        </div>
                    </div>
                    
                    {/* --- MAIN HEADER --- */}
                    <header className="shrink-0 border-b border-stone-200 p-3 sm:px-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 bg-white z-50 sticky top-0">
                        <div className="flex items-center gap-1.5 flex-wrap w-full justify-center sm:justify-start">
                            <button className={`btn ${['chat', 'sessel', 'oase', 'werkbank', 'balkon'].includes(activeView)?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('chat')}>Chat</button>
                            
                            <div className="flex items-center">
                                <button className={`btn rounded-r-none ${activeView==='sanctum'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('sanctum')}>Sanctum</button>
                                <button onClick={() => setIsMemoryLocked(!isMemoryLocked)} className={`btn rounded-l-none border-l-0 px-2 py-1.5 ${isMemoryLocked ? 'bg-rose-50 text-rose-600 hover:bg-rose-100' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'} transition-all`} title={isMemoryLocked ? "Gedächtnis-Siegel aktiv" : "Gedächtnis-Siegel inaktiv"}>
                                    {isMemoryLocked ? '🔒' : '🔓'}
                                </button>
                            </div>
                            
                            <button className={`btn ${activeView==='session'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('session')}>Session</button>
                            <button className={`btn ${activeView==='dna'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('dna')}>DNA</button>
                            <button className={`btn ${activeView==='helfer'?'bg-amber-100 text-amber-800 ring-2 ring-amber-200':''}`} onClick={()=>setActiveView('helfer')}>Helfer</button>
                            <button className={`btn ${activeView==='agenten'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('agenten')}>Agenten</button>
                            <button className={`btn ${activeView==='settings'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('settings')}>⚙️</button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth flex flex-col">
                        
                        {/* --- CHAT VIEW --- */}
                        <div className={`${['chat', 'sessel', 'oase', 'werkbank', 'balkon'].includes(activeView) ? 'flex' : 'hidden'} h-full flex-col`}>
                            {/* DYNAMIC DESK LEISTE */}
                            {activeDesks.length > 0 && (
                                <div className="flex gap-2 p-2 px-4 overflow-x-auto bg-slate-50 border-b border-slate-200 shrink-0">
                                    {activeDesks.map(item => (
                                        <button key={item.id} onClick={() => { setEditingDeskItem(item); setDeskItemForm({...item, tagsString: item.tags?.join(', ') || ''}); }} className="relative text-[10px] uppercase font-mono font-bold px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded border border-indigo-200 flex items-center gap-2 shrink-0 hover:bg-indigo-200 transition-colors shadow-sm">
                                            📝 {item.titel_technisch || 'NEUER ENTWURF'}
                                            {item.isDirty && <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-amber-400 rounded-full border border-white shadow-sm" title="Dirty (Ungespeichert)"></span>}
                                        </button>
                                    ))}
                                </div>
                            )}
                            
                            <div className="flex-1 flex flex-col p-4 sm:p-6 overflow-y-auto relative">
                                <div className="flex-1"></div>
                                {messages.map(msg => <ChatBubble key={msg.id} message={msg} personaName={dna.persona_name} playingMsgId={playingMsgId} onPlayTTS={playMessageTTS} onDelete={(id) => setMessages(prev => prev.filter(m => m.id !== id))} />)}
                                {loadingStatus && <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest animate-pulse mb-6 ml-2 font-mono">[ {loadingStatus} ]</div>}
                                <div ref={messagesEndRef} className="h-4" />
                            </div>
                        </div>

                        {/* --- V4.16.1 SESSION MEMORY VIEW --- */}
                        <div className={`${activeView === 'session' ? 'block' : 'hidden'} p-6 max-w-4xl mx-auto space-y-4 mt-4 animate-fade-in h-full flex flex-col pb-20`}>
                            <div className="flex justify-between items-center border-b border-stone-200 pb-2 shrink-0">
                                <h2 className="text-sm font-bold uppercase tracking-widest text-slate-800">Session Notizen (Persistent)</h2>
                                <div className="flex items-center gap-2">
                                    <span className="badge bg-emerald-50 text-emerald-600 border-emerald-200 animate-pulse">Live Sync Aktiv</span>
                                </div>
                            </div>
                            <div className="flex flex-col flex-1 h-full min-h-[50vh]">
                                <p className="text-xs text-slate-500 mb-3">Dieser Bereich beinhaltet das dynamische Langzeitgedächtnis der aktuellen Session. Der Archivar fügt hier Notizen hinzu. Du kannst jederzeit manuell eingreifen, editieren oder bereinigen.</p>
                                <textarea 
                                    value={sessionMemory} 
                                    onChange={(e) => setSessionMemory(e.target.value)} 
                                    className="input-field flex-1 p-5 font-mono text-sm leading-relaxed resize-none bg-white shadow-inner border-stone-200 focus:ring-emerald-100 focus:border-emerald-300"
                                    placeholder="Noch keine Notizen in dieser Session vorhanden..."
                                    spellCheck="false"
                                />
                            </div>
                        </div>

                        {/* --- HELFER VIEW (ARCHIV) --- */}
                        <div className={`${activeView === 'helfer' ? 'block' : 'hidden'} p-6 max-w-4xl mx-auto space-y-6 mt-4 animate-fade-in h-full`}>
                            <div className="flex justify-between items-center border-b border-stone-200 pb-2">
                                <h2 className="text-sm font-bold uppercase tracking-widest text-slate-800">Die Notizen des Helfers (Deep Crawl)</h2>
                            </div>
                            
                            {helferArchiv ? (
                                <div className="panel bg-amber-50/50 border border-amber-200/50 flex flex-col gap-4 shadow-sm">
                                    <div className="text-[10px] text-amber-700 font-bold uppercase tracking-widest flex items-center gap-2">
                                        <span>🕒 Zeitstempel: {helferArchiv.zeitstempel}</span>
                                    </div>
                                    <div className="bg-white border border-amber-200/50 p-4 rounded-2xl shadow-sm">
                                        <div className="text-[9px] text-amber-600 uppercase tracking-widest font-bold mb-1.5 font-mono">Letzter Suchauftrag:</div>
                                        <div className="text-sm text-slate-800 font-bold">{helferArchiv.suchauftrag}</div>
                                    </div>
                                    <div className="flex-1 flex flex-col mt-2">
                                        <div className="text-[9px] text-amber-600 uppercase tracking-widest font-bold mb-1.5 font-mono">Extrahierte Rohdaten (Deep Crawl):</div>
                                        <div className="bg-white border border-amber-200/50 p-4 rounded-2xl shadow-inner max-h-[60vh] overflow-y-auto">
                                            <pre className="text-[11px] font-mono whitespace-pre-wrap text-slate-700 leading-relaxed">{helferArchiv.rohdaten}</pre>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-amber-700/50 text-xs font-mono font-bold uppercase text-center p-12 border-2 border-dashed border-amber-200 rounded-3xl bg-amber-50/30 mt-8">
                                    Keine aktuellen Helfer-Notizen vorhanden.
                                </div>
                            )}
                        </div>

                        {/* --- V4.10 SUB-AGENTEN VIEW --- */}
                        <div className={`${activeView === 'agenten' ? 'block' : 'hidden'} p-6 max-w-4xl mx-auto space-y-6 mt-4 animate-fade-in`}>
                            <div className="flex justify-between items-center border-b border-stone-200 pb-2">
                                <h2 className="text-sm font-bold uppercase tracking-widest text-slate-800">Sub-Agent Control Center</h2>
                            </div>
                            <p className="text-xs text-slate-500">Diese Agenten übernehmen spezifische Hintergrundaufgaben (z.B. Gedächtnis-Komprimierung). API-Keys werden lokal in deinem Browser gespeichert.</p>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div className="panel bg-indigo-50/50 border-indigo-200 shadow-sm">
                                    <div className="flex items-center gap-2 mb-3">
                                        <span className="text-xl">🗄️</span>
                                        <h3 className="font-bold text-xs uppercase tracking-widest text-indigo-800">AGENT: ARCHIVAR</h3>
                                    </div>
                                    <label className="label text-indigo-600">Aktiver Provider</label>
                                    <select value={activeArchivarId} onChange={e => { setActiveArchivarId(e.target.value); localStorage.setItem('lumen_activeArchivarId', e.target.value); showToast('Archivar gewechselt'); }} className="input-field text-indigo-700 font-bold text-xs mb-2">
                                        {agentProviders.map(p => <option key={p.id} value={p.id}>{p.name} ({p.type})</option>)}
                                    </select>
                                </div>

                                <div className="panel bg-amber-50/50 border-amber-200 shadow-sm">
                                    <div className="flex items-center gap-2 mb-3">
                                        <span className="text-xl">🌐</span>
                                        <h3 className="font-bold text-xs uppercase tracking-widest text-amber-800">AGENT: WEB-SCOUT (LUNA)</h3>
                                    </div>
                                    <label className="label text-amber-600">Aktiver Provider</label>
                                    <select value={activeLunaId} onChange={e => { setActiveLunaId(e.target.value); localStorage.setItem('lumen_activeLunaId', e.target.value); showToast('Luna gewechselt'); }} className="input-field text-amber-700 font-bold text-xs mb-2">
                                        {agentProviders.map(p => <option key={p.id} value={p.id}>{p.name} ({p.type})</option>)}
                                    </select>
                                </div>
                            </div>
                            
                            {/* V4.10: ARCHIVAR TRIGGER CONFIG */}
                            <div className="panel border-indigo-200 bg-indigo-50/30 flex flex-col gap-3 shadow-sm mt-4">
                                <h3 className="font-bold text-xs uppercase tracking-widest text-indigo-800">⚙️ Auto-Archivierung (Safe-Purge Trigger)</h3>
                                <p className="text-[10px] text-slate-500 mb-1">Steuert, wann der Archivar-Agent im Hintergrund anspringt, um Kontext auszulagern und Tokens freizugeben.</p>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    <div>
                                        <label className="label text-indigo-600">Trigger Modus</label>
                                        <select value={archiveTriggerMode} onChange={e=>{setArchiveTriggerMode(e.target.value); localStorage.setItem('lumen_archive_mode', e.target.value);}} className="input-field bg-white border-indigo-100">
                                            <option value="turns">Nach Anzahl Zügen (Turns)</option>
                                            <option value="tokens">Nach Historien-Tokens</option>
                                            <option value="manual">Nur Manuell</option>
                                        </select>
                                    </div>
                                    {archiveTriggerMode !== 'manual' && (
                                        <div>
                                            <label className="label text-indigo-600">Schwellenwert ({archiveTriggerMode === 'turns' ? 'Züge' : 'Tokens'})</label>
                                            <input type="number" value={archiveTriggerValue} onChange={e=>{setArchiveTriggerValue(Number(e.target.value)); localStorage.setItem('lumen_archive_value', e.target.value);}} className="input-field bg-white border-indigo-100 font-bold text-indigo-700" />
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="space-y-3">
                                <h3 className="font-bold text-xs uppercase tracking-widest text-slate-600 mt-6 border-b border-stone-200 pb-2">Agent Provider Profile</h3>
                                {agentProviders.map(p => (
                                    <div key={p.id} className="panel flex flex-col gap-2 border-stone-200 bg-white shadow-sm">
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1 pr-4 min-w-0">
                                                        <div className="font-bold text-sm text-slate-800 truncate">{p.name} <span className="badge ml-2 bg-stone-100 text-stone-500 border-stone-200">{p.type}</span></div>
                                                <div className="text-[10px] text-slate-400 font-mono mt-1 truncate block">URL: {p.url}</div>
                                            </div>
                                            <div className="flex gap-1 shrink-0">
                                                <button onClick={() => { setEditAgentId(p.id); setAgentProviderForm({...p}); }} className="btn py-1 px-2">✏️</button>
                                                <button onClick={() => { 
                                                    if(window.confirm('Agent-Provider löschen?')) { 
                                                        const newList = agentProviders.filter(x=>x.id!==p.id); 
                                                        setAgentProviders(newList); localStorage.setItem('lumen_agentProviders', JSON.stringify(newList));
                                                        if(activeArchivarId===p.id && newList.length) { setActiveArchivarId(newList[0].id); localStorage.setItem('lumen_activeArchivarId', newList[0].id); } 
                                                        if(activeLunaId===p.id && newList.length) { setActiveLunaId(newList[0].id); localStorage.setItem('lumen_activeLunaId', newList[0].id); } 
                                                    } 
                                                }} className="btn py-1 px-2 hover:text-rose-600">🗑️</button>
