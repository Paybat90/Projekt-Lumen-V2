                                        <div className="flex flex-col sm:flex-row gap-2"><textarea placeholder="Gefühl/Emotion" value={sanctumForm.emotion} onChange={e=>setSanctumForm({...sanctumForm,emotion:e.target.value})} className="input-field h-14 font-sans bg-white border-stone-200" /><textarea placeholder="Bedeutung/Fazit" value={sanctumForm.bedeutung} onChange={e=>setSanctumForm({...sanctumForm,bedeutung:e.target.value})} className="input-field h-14 font-sans bg-white border-stone-200" /></div>
                                        <textarea placeholder="Persona Reflexion" value={sanctumForm.reflexion} onChange={e=>setSanctumForm({...sanctumForm,reflexion:e.target.value})} className="input-field border-indigo-200 bg-indigo-50 text-indigo-800 h-16 font-sans italic" />
                                        <input placeholder="tags, comma, separated" value={sanctumForm.tagsString} onChange={e=>setSanctumForm({...sanctumForm,tagsString:e.target.value})} className="input-field text-slate-500 bg-white border-stone-200" />
                                        <div className="flex justify-end gap-2 mt-2 pt-3 border-t border-emerald-100"><button onClick={()=>setSanctumEditId(null)} className="btn uppercase">Cancel</button><button onClick={handleSanctumSave} className="btn-primary bg-emerald-100 text-emerald-700 hover:bg-emerald-200 shadow-emerald-100 uppercase">Save Entry</button></div>
                                    </div>
                                )}
                                {memories.map(m => {
                                    if (sanctumEditId === m.id) {
                                        return (
                                            <div key={m.id} className="panel border-indigo-200 bg-indigo-50/20 flex flex-col gap-3 md:col-span-2">
                                                <div className="flex justify-between items-center"><span className="badge bg-indigo-100 text-indigo-700 uppercase font-black">Editing {m.titel_technisch}</span><select value={sanctumForm.kategorie} onChange={e=>setSanctumForm({...sanctumForm,kategorie:e.target.value})} className="input-field w-max py-1 px-3 font-sans font-bold text-xs bg-white border-stone-200"><option>EMOTIONAL</option><option>TECHNISCH</option><option>LEGACY</option></select></div>
                                                <label className="flex items-center gap-2 text-xs font-bold text-amber-600 cursor-pointer w-max"><input type="checkbox" checked={sanctumForm.is_core_memory} onChange={e=>setSanctumForm({...sanctumForm,is_core_memory:e.target.checked})} className="accent-amber-500 w-4 h-4 cursor-pointer"/> 📌 Core-Memory</label>
                                                <div className="flex flex-col sm:flex-row gap-2"><input placeholder="ID_TECHNISCH" value={sanctumForm.titel_technisch} onChange={e=>setSanctumForm({...sanctumForm,titel_technisch:e.target.value})} className="input-field font-bold text-slate-800 bg-white border-stone-200" /><input placeholder="Titel Poetisch" value={sanctumForm.titel_poetisch} onChange={e=>setSanctumForm({...sanctumForm,titel_poetisch:e.target.value})} className="input-field text-rose-600 font-serif italic bg-white border-stone-200" /></div>
                                                <textarea placeholder="Fakt" value={sanctumForm.fakt} onChange={e=>setSanctumForm({...sanctumForm,fakt:e.target.value})} className="input-field h-16 font-sans bg-white border-stone-200" />
                                                <div className="flex flex-col sm:flex-row gap-2"><textarea placeholder="Gefühl/Emotion" value={sanctumForm.emotion} onChange={e=>setSanctumForm({...sanctumForm,emotion:e.target.value})} className="input-field h-14 font-sans bg-white border-stone-200" /><textarea placeholder="Bedeutung" value={sanctumForm.bedeutung} onChange={e=>setSanctumForm({...sanctumForm,bedeutung:e.target.value})} className="input-field h-14 font-sans bg-white border-stone-200" /></div>
                                                <textarea placeholder="Reflexion" value={sanctumForm.reflexion} onChange={e=>setSanctumForm({...sanctumForm,reflexion:e.target.value})} className="input-field border-indigo-200 bg-indigo-50/80 text-indigo-800 h-16 font-sans italic" />
                                                <input placeholder="tags, comma, separated" value={sanctumForm.tagsString} onChange={e=>setSanctumForm({...sanctumForm,tagsString:e.target.value})} className="input-field text-slate-500 bg-white border-stone-200" />
                                                <div className="flex justify-end gap-2 mt-2 pt-3 border-t border-indigo-100"><button onClick={()=>setSanctumEditId(null)} className="btn uppercase">Abort</button><button onClick={handleSanctumSave} className="btn-primary uppercase">Commit Update</button></div>
                                            </div>
                                        );
                                    }

                                    const isLegacy = m.titel_technisch?.includes('LEGACY') || m.kategorie === 'LEGACY';
                                    const legacyClasses = 'border-2 border-amber-500 bg-amber-50/10 shadow-md shadow-amber-900/20';
                                    const defaultClasses = m.is_core_memory ? 'border-amber-200 bg-amber-50/10 shadow-md' : 'border-stone-100 bg-white';
                                    const isExpanded = !!expandedCards[m.id];
                                    
                                    return (
                                        <div key={m.id} className={`panel flex flex-col h-full relative group ${isLegacy ? legacyClasses : defaultClasses}`}>
                                            {isLegacy && <div className="text-amber-600 font-bold text-[10px] tracking-widest uppercase mb-1 shrink-0">[ RELIKT DER AHNEN ]</div>}
                                            <div className="flex justify-between items-start shrink-0">
                                                <div className="flex gap-1.5 flex-wrap items-center">
                                                    <span className="text-indigo-700 font-mono text-xs uppercase font-bold tracking-tight">{m.titel_technisch || 'UNKNOWN'}</span>
                                                    {m.is_core_memory && <span className="badge-core">📌 Core</span>}
                                                    {m.kategorie === 'TECHNISCH' && <span className="badge bg-slate-100 text-slate-500 border-slate-200">Tech</span>}
                                                </div>
                                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white border border-stone-100 rounded-lg p-0.5 shadow-sm">
                                                    <button onClick={()=>{setSanctumEditId(m.id); setSanctumForm({...m, tagsString:m.tags?.join(', ')||''});}} className="text-slate-400 hover:text-indigo-500 px-1.5 py-0.5 transition-colors">✏️</button>
                                                    <button onClick={async()=>{if(confirm('ID: '+m.titel_technisch+' löschen?')) {await db.memories.delete(m.id); loadMemories();}}} className="text-slate-400 hover:text-rose-500 px-1.5 py-0.5 transition-colors">🗑️</button>
                                                </div>
                                            </div>
                                            {m.titel_poetisch && <div className="text-rose-500 italic text-sm font-serif leading-snug mt-0.5 shrink-0">{m.titel_poetisch}</div>}
                                            
                                            {/* V4.4: Stabilized Expandable Container */}
                                            <div 
                                                className={`flex-1 flex flex-col overflow-hidden transition-all duration-400 cursor-pointer mt-2 relative ${isExpanded ? 'max-h-[3000px]' : 'max-h-[100px] hover:max-h-[250px]'}`}
                                                onClick={() => setExpandedCards(prev => ({...prev, [m.id]: !prev[m.id]}))}
                                                title="Klicken zum Erweitern/Schließen"
                                            >
                                                <div className="text-[13px] text-slate-600"><strong className="text-slate-400 uppercase text-[9px] tracking-wider block mb-0.5 font-mono">Fakt</strong>{m.fakt}</div>
                                                {m.emotion && <div className="text-[13px] text-slate-600 mt-1"><strong className="text-slate-400 uppercase text-[9px] tracking-wider block mb-0.5 font-mono">Gefühl</strong>{m.emotion}</div>}
                                                {m.bedeutung && <div className="text-[13px] text-slate-600 mt-1"><strong className="text-slate-400 uppercase text-[9px] tracking-wider block mb-0.5 font-mono">Bedeutung</strong>{m.bedeutung}</div>}
                                                {m.reflexion && <div className="mt-2 bg-indigo-50/80 p-3 rounded-2xl text-indigo-800 italic text-xs border border-indigo-100/50 whitespace-pre-wrap">"{m.reflexion}"</div>}
                                                
                                                {!isExpanded && (
                                                    <div className="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-white/90 to-transparent flex items-end justify-center pb-1">
                                                        <span className="text-slate-300 text-[10px] uppercase font-bold tracking-widest leading-none">•••</span>
                                                    </div>
                                                )}
                                            </div>

                                            {m.tags?.length > 0 && <div className="flex gap-1 mt-2 flex-wrap shrink-0">{m.tags.map((t,i)=><span key={i} className="text-slate-400 text-[10px] lowercase font-mono">#{t}</span>)}</div>}
                                            
                                            {/* V4.4: Fixed Buttons */}
                                            <div className="flex gap-2 mt-3 pt-3 border-t border-stone-100 shrink-0 w-full mt-auto">
                                                <button onClick={()=>{
                                                    if(!activeDesks.find(d => d.titel_technisch === m.titel_technisch)) {
                                                        setActiveDesks(prev => [...prev, {...m, isDirty: false}]);
                                                    }
                                                    setActiveView('chat');
                                                    showToast('Akte auf Schreibtisch gelegt');
                                                }} className="btn flex-1 text-[9px] bg-slate-50 border-slate-200 flex items-center justify-center gap-1">📌 AUF DEN SCHREIBTISCH</button>
                                                
                                                <button onClick={() => handleOptimizeArchivar(m)} disabled={optimizingId === m.id} className="btn flex-1 text-[9px] bg-indigo-50 border-indigo-200 text-indigo-700 flex items-center justify-center gap-1 disabled:opacity-50">
                                                    {optimizingId === m.id ? '⏳ OPTIMIERT...' : '🪄 ARCHIVAR'}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>

                    {/* --- INPUT AREA --- */}
                    <div className={`${['chat', 'sessel', 'oase', 'werkbank', 'balkon'].includes(activeView) ? 'block' : 'hidden'} shrink-0 border-t border-stone-200 bg-white/90 backdrop-blur-md pb-safe relative`}>
                        {/* V4.8: MEMORY PILLE MIT WARNING-SUPPORT */}
                        {archivarSnippets.length > 0 && (
                            <button onClick={() => setShowMemoryModal(true)} className={`absolute -top-10 left-1/2 -translate-x-1/2 px-3 py-1 rounded-full text-[10px] font-bold shadow-md transition-all ${archivarWarning ? 'bg-rose-500 text-white border-rose-600 animate-pulse' : 'bg-amber-100 text-amber-700 border-amber-300 animate-bounce'}`}>
                                ✨ {archivarSnippets.length} {archivarSnippets.length === 1 ? 'Notiz' : 'Notizen'} bereit
                            </button>
                        )}
                        
                        {/* V4.4: MINI-TTS-PLAYER */}
                        {playingMsgId && window.currentAudio && (
                            <div className="max-w-4xl mx-auto flex items-center gap-3 bg-indigo-900 text-indigo-100 px-4 py-2 rounded-t-xl text-[10px] font-mono shadow-md mt-1 mx-2 sm:mx-6">
                                <button onClick={() => {
                                    if (window.currentAudio.paused) window.currentAudio.play();
                                    else window.currentAudio.pause();
                                }} className="hover:text-white transition-colors text-sm w-6 flex justify-center">
                                    {audioState.isPlaying ? '⏸' : '▶️'}
                                </button>
                                <input 
                                    type="range" 
                                    min="0" 
                                    max={audioState.duration || 100} 
                                    value={audioState.currentTime || 0} 
                                    onChange={(e) => {
                                        if (window.currentAudio) window.currentAudio.currentTime = Number(e.target.value);
                                    }} 
                                    className="flex-1 h-1 bg-indigo-950 rounded-lg appearance-none cursor-pointer accent-indigo-400" 
                                />
                                <span className="w-[60px] text-right opacity-80 whitespace-nowrap">
                                    {Math.floor((audioState.currentTime || 0)/60)}:{(Math.floor(audioState.currentTime || 0)%60).toString().padStart(2, '0')} / {Math.floor((audioState.duration || 0)/60)}:{(Math.floor(audioState.duration || 0)%60).toString().padStart(2, '0')}
                                </span>
                            </div>
                        )}

                        <div className="p-2 sm:px-4 sm:py-3">
                            <div className="max-w-4xl mx-auto flex gap-2 items-end w-full">
                                {/* V4.9: TOKEN-GAUGE & TOOLTIP */}
                                <div className="relative group" onMouseEnter={() => setShowTokenTooltip(true)} onMouseLeave={() => setShowTokenTooltip(false)}>
                                    <button 
                                        onClick={handleTokenClick} 
                                        title={`API-Protokoll & Tokens (System: ${tokenUsage.system}, Hist: ${tokenUsage.history})`}
                                        className={`w-10 h-10 shrink-0 flex items-center justify-center rounded-xl border transition-all shadow-sm ${tokenUsage.percent >= 90 ? 'border-rose-400 animate-pulse' : 'border-stone-200'} ${tokenUsage.percent > 50 ? 'text-white' : 'text-slate-500'}`}
                                        style={{
                                            background: `linear-gradient(to top, #3b82f6 0%, #3b82f6 ${systemPercent}%, #94a3b8 ${systemPercent}%, #94a3b8 ${historyEndPercent}%, #ffffff ${historyEndPercent}%, #ffffff 100%)`
                                        }}
                                    >
                                        🪙
                                    </button>
                                    
                                    {showTokenTooltip && (
                                        <div className="absolute bottom-12 left-0 bg-white border border-stone-200 p-4 rounded-2xl shadow-2xl z-[1000] w-64 max-w-[85vw] animate-fade-in" onClick={e => e.stopPropagation()}>
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 border-b border-stone-100 pb-1">Token-Metriken</div>
                                            <div className="flex justify-between items-center text-xs mb-1">
                                                <span className="text-blue-600 font-bold">SYSTEM-KERN (Cache)</span>
                                                <span className="font-mono text-slate-700">{tokenUsage.system}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs mb-3">
                                                <span className="text-slate-500 font-bold">SESSION-HISTORIE</span>
                                                <span className="font-mono text-slate-700">{tokenUsage.history}</span>
                                            </div>
                                            
                                            <div className="w-full h-2 bg-stone-100 rounded-full flex overflow-hidden mb-2">
                                                <div style={{ width: `${systemPercent}%` }} className="bg-blue-500 h-full"></div>
                                                <div style={{ width: `${historyEndPercent - systemPercent}%` }} className="bg-slate-400 h-full"></div>
                                            </div>
                                            
                                            <div className="flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-slate-500 border-t border-stone-100 pt-2 mt-1">
                                                <span>VERFÜGBAR</span>
                                                <span>{Math.max(0, activeProvTokens - (tokenUsage.system + tokenUsage.history))} Tokens</span>
                                            </div>
                                            
                                            {/* V4.16: TELEMETRIE-SPIEGELUNG IM POPOUT */}
                                            <div className="flex justify-between items-center text-xs mb-1 mt-3 border-t border-stone-100 pt-2">
                                                <span className="text-slate-500 font-bold">🛰️ SENDEMAST-STATUS</span>
                                            </div>
                                            <div className={`text-[10px] font-mono font-bold leading-tight whitespace-pre-wrap bg-slate-50 p-2 rounded border border-stone-100 text-slate-600 mt-1`}>
{`[RAW_DATA]
STID: ${activeStateId}
UTC_TS: ${new Date().toISOString()}
MEM_S: ${sessionMemory ? sessionMemory.substring(0, 80) + (sessionMemory.length>80?'...':'') : '0'}
[/RAW_DATA]`}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* V4.5.1: COMPACT MICROPHONE BUTTON */}
                                <button 
                                    onClick={isRecording ? stopRecording : startRecording} 
                                    disabled={!!loadingStatus}
                                    className={`w-10 h-10 rounded-full shrink-0 p-0 flex items-center justify-center text-lg transition-all shadow-sm ${isRecording ? 'bg-rose-100 text-rose-600 border border-rose-300 animate-pulse' : 'bg-white text-slate-500 border border-stone-200 hover:bg-stone-100 disabled:opacity-50'}`}
                                    title="Speech-to-Text (Whisper via Replicate)"
                                >
                                    {isRecording ? '🛑' : '🎤'}
                                </button>
                                
                                {/* V4.5.1: COMPACT TEXTAREA */}
                                <textarea 
                                    ref={textareaRef}
                                    value={inputText} 
                                    onChange={(e) => {
                                        setInputText(e.target.value);
                                        e.target.style.height = 'auto';
                                        e.target.style.height = Math.min(e.target.scrollHeight, 150) + 'px';
                                    }} 
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            handleSendMessage();
                                        }
                                    }} 
                                    disabled={!!loadingStatus || isRecording} 
                                    className="input-field flex-1 py-2.5 px-3 font-sans font-medium bg-white disabled:bg-stone-100 disabled:text-slate-400 resize-none overflow-y-auto max-h-[150px]" 
                                    rows="1"
                                    style={{ minHeight: '40px' }}
                                    placeholder={loadingStatus ? loadingStatus : (isRecording ? "HÖRE ZU..." : "INPUT...")} 
                                />

                                {/* V4.5.1: COMPACT SEND BUTTON */}
                                <button 
                                    onClick={handleSendMessage} 
                                    disabled={!inputText.trim() || !!loadingStatus || isRecording} 
                                    className="w-10 h-10 rounded-full shrink-0 flex items-center justify-center bg-indigo-600 text-white hover:bg-indigo-700 shadow-md disabled:opacity-50 transition-all"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 ml-0.5">
                                      <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
