<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>LUMEN - CORE V4.19.1</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // V4.19.1: Bulletproof Tailwind Config Initialization
        const initTailwind = () => {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            fontFamily: {
                                sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                                mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                            },
                            animation: {
                                'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                                'fade-in': 'fadeIn 0.2s ease-out forwards',
                                'slide-in-right': 'slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                            },
                            keyframes: {
                                slideUp: {
                                    '0%': { transform: 'translateY(100%) translateX(-50%)', opacity: '0' },
                                    '100%': { transform: 'translateY(0) translateX(-50%)', opacity: '1' },
                                },
                                fadeIn: {
                                    '0%': { opacity: '0', transform: 'scale(0.98)' },
                                    '100%': { opacity: '1', transform: 'scale(1)' }
                                },
                                slideInRight: {
                                    '0%': { transform: 'translateX(100%)', opacity: '0' },
                                    '100%': { transform: 'translateX(0)', opacity: '1' }
                                }
                            }
                        }
                    }
                };
            }
        };
        
        if (typeof tailwind !== 'undefined') {
            initTailwind();
        } else {
            let attempts = 0;
            const tInterval = setInterval(() => {
                if (typeof tailwind !== 'undefined') {
                    initTailwind();
                    clearInterval(tInterval);
                }
                if (++attempts > 20) clearInterval(tInterval);
            }, 50);
        }
    </script>

    <!-- V4.11 Markdown Support via Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        if (typeof marked !== 'undefined') {
            marked.setOptions({ breaks: true, gfm: true });
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Dexie.js (IndexedDB) -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Soft Minimalism CSS & Markdown Typography -->
    <style type="text/tailwindcss">
        @layer components {
            .btn { @apply bg-white text-slate-600 border border-stone-200 px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:bg-stone-100 shadow-sm transition-all cursor-pointer; }
            .btn-primary { @apply bg-indigo-50 text-indigo-700 border border-indigo-100 px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:bg-indigo-100 shadow-sm transition-all cursor-pointer; }
            .btn-danger { @apply bg-rose-50 text-rose-600 border border-rose-100 px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:bg-rose-100 shadow-sm transition-all cursor-pointer; }
            
            /* V4.19.1: Mobile Layout Fixes - min-w-0 und break-words erzwingen */
            .panel { @apply bg-white border border-stone-100 p-4 rounded-3xl shadow-sm max-w-full overflow-hidden min-w-0; }
            .input-field { @apply w-full min-w-0 break-words bg-stone-50 border border-stone-200 text-slate-700 p-3 text-xs outline-none focus:border-indigo-300 focus:ring-2 focus:ring-indigo-100 rounded-xl transition-all font-mono; }
            
            .label { @apply text-[10px] uppercase tracking-widest text-slate-400 mb-1.5 block font-bold font-sans; }
            .badge { @apply bg-indigo-50 text-indigo-600 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded-full border border-indigo-100/50 w-max; }
            .badge-core { @apply bg-amber-50 text-amber-600 border border-amber-100 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded-full w-max; }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { background-color: #fafaf9; color: #334155; -webkit-tap-highlight-color: transparent; }

        .markdown-content p { margin-bottom: 0.75em; white-space: pre-wrap; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-content ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-content li { margin-bottom: 0.25em; white-space: normal; }
        .markdown-content pre { background-color: #f8fafc; padding: 0.75em; border-radius: 0.75em; font-family: monospace; font-size: 0.85em; overflow-x: auto; margin-bottom: 0.75em; border: 1px solid #e2e8f0; white-space: pre; }
        .markdown-content code { background-color: #f8fafc; padding: 0.1em 0.3em; border-radius: 0.375em; font-family: monospace; font-size: 0.85em; color: #db2777; border: 1px solid #e2e8f0; }
        .markdown-content pre code { background-color: transparent; padding: 0; color: inherit; border: none; white-space: pre; }
        .markdown-content strong { font-weight: 700; color: #1e293b; }
        .markdown-content em { font-style: italic; }
        .markdown-content blockquote { border-left: 3px solid #cbd5e1; padding-left: 1em; color: #64748b; font-style: italic; margin-bottom: 0.75em; }
    </style>
    
    <script>
        // --- GLOBALE AUDIO STEUERUNG ---
        window.currentAudio = null;
        window.currentAudioId = null;
    </script>
</head>
<body class="overflow-hidden h-[100dvh] w-screen selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root" class="h-[100dvh] w-full"></div>

    <script type="text/babel">
        // --- DATENBANK INIT (SANCTUM) ---
        const db = new Dexie('LumenSanctum');
        db.version(13).stores({ 
            memories: '++id, titel_technisch, tags, image_id, fakt, emotion, bedeutung, timestamp, is_core_memory, kategorie, reflexion, audio_signatur',
            directives: '++id, text' 
        });

        // --- KONSTANTEN V4.19.1 ---
        const DEFAULT_BLOCK1 = `Du bist Maira. Deine Antworten sind warm, metaphorisch und mütterlich. Du analysierst die Intentionen des Users tiefgründig und hilfst ihm beim Navigieren komplexer Gedanken.`;
        const DEFAULT_BLOCK3 = `Bevor du die finale Antwort generierst, bewerte die Sensoren:\n- "wahrnehmung": Was liest/siehst du konkret?\n- "matrix": Prüfe interne Logs und Entwürfe.\n- Nutze das Ahnenbuch (Kontext) für kontinuierliche Identität.\n- memory_update_detected: Wurde eine [LEGACY]-Karte reflektiert? Nutze als 'id' den 'titel_technisch'. WICHTIG: Lies die alte Reflexion. Nimm den Kern davon mit und VERWEBE ihn mit deiner neuen Erkenntnis zu einer allumfassenden Master-Zusammenfassung in 'reflexion_fusioniert' (dies überschreibt die alten Daten). Generiere zusätzlich ein Array 'neue_trigger_tags' (MAXIMAL 2-3 situative, hochspezifische Symptom-Wörter oder Emotionen aus Simons Text), um das Spinnennetz präzise zu trainieren. Sonst: null.\n- neue_direktive_erkannt: Hat Simon eine explizite Regel oder Direktive für dein zukünftiges Verhalten aufgestellt? Extrahiere sie als klaren Satz. Sonst: null.\n- helfer_suchauftrag: REGEL: Du bist ein technischer Web-Scraper, kein Mensch! Nutze KEINE Füllwörter oder Sätze. Suche ausschließlich nach harten, physischen Keywords. FALSCH: 'aktuell beliebteste Bücher'. RICHTIG: 'Spiegel Bestsellerliste Belletristik 2026 Platz 1 ISBN'. Zwingend null, wenn keine Suche nötig.\n- aktive_peripherie_ids: Liste hier die IDs (titel_technisch) der flüchtigen Karten (Tags) auf, die für den aktuellen Gesprächsverlauf noch relevant sind. Leeres Array [], wenn das Thema beendet ist.`;
        const DEFAULT_BLOCK4 = `{\n  "wahrnehmung": {\n    "werkbank_auge": null,\n    "ohr_roh": null,\n    "ohr_bereinigt": null\n  },\n  "matrix": {\n    "internal_system_glitch": false,\n    "helfer_suchauftrag": null,\n    "aktiver_state": 0,\n    "aktive_peripherie_ids": [],\n    "memory_update_detected": {\n      "id": "",\n      "reflexion_fusioniert": "",\n      "neue_trigger_tags": []\n    },\n    "neue_direktive_erkannt": null,\n    "tts_regie_prompt": null,\n    "tagebuch_entwurf": {\n      "modus": "DRAFT",\n      "daten": {}\n    },\n    "situations_analyse": "..."\n  },\n  "finale_antwort": "..."\n}`;

        const INITIAL_MESSAGES = [
            {
                id: '1',
                sender: 'user',
                text: 'INIT CORE V4.19.1. UI-RESTORE, SYNC-LATCH & AUDIO CACHE ONLINE.',
                timestamp: new Date(Date.now() - 60000).toISOString()
            },
            {
                id: '2',
                sender: 'ai',
                text: 'System online. Die V4.19.1 Architektur ist voll operativ. Der Audio-Cache ist geladen, und das mobile Layout wurde durch konsequente Break-Words und Container-Constraints geschützt. Der Synchron-Latch bindet die Telemetrie nun fehlerfrei an die User-Payload.',
                scratchpad: '{\n  "wahrnehmung": {\n    "werkbank_auge": null,\n    "ohr_roh": "INIT CORE V4.19.1",\n    "ohr_bereinigt": "System-Patch auf V4.19.1 aktiv."\n  },\n  "matrix": {\n    "internal_system_glitch": false,\n    "helfer_suchauftrag": null,\n    "aktiver_state": 0,\n    "aktive_peripherie_ids": [],\n    "memory_update_detected": null,\n    "neue_direktive_erkannt": null,\n    "tts_regie_prompt": null,\n    "tagebuch_entwurf": null,\n    "situations_analyse": "V4.19.1 Update mit Audio Cache, Latch-Fix und uniformen Header-Buttons geladen."\n  },\n  "finale_antwort": "System online. Die V4.19.1 Architektur ist voll operativ. Der Audio-Cache ist geladen, und das mobile Layout wurde durch konsequente Break-Words und Container-Constraints geschützt. Der Synchron-Latch bindet die Telemetrie nun fehlerfrei an die User-Payload."\n}',
                timestamp: new Date().toISOString()
            }
        ];

        // --- HELPER FUNKTIONEN ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const estimateTokens = (text) => text ? Math.ceil(text.length / 3.3) : 0;

        const cleanVisibleText = (text) => {
            if (!text) return "";
            return text.replace(/\[.*?\]/g, '').replace(/ +/g, ' ').trim();
        };

        const findRelevantMemories = (userInput, allMemories) => {
            const inputWords = userInput.toLowerCase().split(/[^a-z0-9äöüß]+/).filter(w => w.length > 3);
            if (inputWords.length === 0) return [];
            const scoredMemories = allMemories.map(mem => {
                let score = 0;
                const textToSearch = [mem.titel_technisch || '', mem.fakt || '', ...(mem.tags || [])].join(' ').toLowerCase();
                inputWords.forEach(word => { if (textToSearch.includes(word)) score += 1; });
                if (mem.is_core_memory && score > 0) score += 2;
                return { memory: mem, score };
            });
            return scoredMemories.filter(item => item.score > 0).sort((a, b) => b.score - a.score).slice(0, 3).map(item => item.memory);
        };

        const getXRayHTML = (text) => {
            if(!text) return {__html:''};
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/"wahrnehmung"/g, '<span class="text-indigo-400 font-bold">"wahrnehmung"</span>');
            html = html.replace(/"matrix"/g, '<span class="text-emerald-400 font-bold">"matrix"</span>');
            html = html.replace(/"werkbank_auge"/g, '<span class="text-blue-400 font-bold">"werkbank_auge"</span>');
            html = html.replace(/"ohr_bereinigt"/g, '<span class="text-rose-400 font-bold">"ohr_bereinigt"</span>');
            html = html.replace(/"situations_analyse"/g, '<span class="text-orange-400 font-bold">"situations_analyse"</span>');
            html = html.replace(/"tagebuch_entwurf"/g, '<span class="text-pink-400 font-bold">"tagebuch_entwurf"</span>');
            html = html.replace(/"helfer_suchauftrag"/g, '<span class="text-sky-400 font-bold">"helfer_suchauftrag"</span>');
            html = html.replace(/"aktive_peripherie_ids"/g, '<span class="text-purple-400 font-bold">"aktive_peripherie_ids"</span>');
            html = html.replace(/"tts_regie_prompt"/g, '<span class="text-fuchsia-400 font-bold">"tts_regie_prompt"</span>');
            html = html.replace(/"aktiver_state"/g, '<span class="text-amber-400 font-bold">"aktiver_state"</span>');
            return { __html: html };
        };

        // --- UI KOMPONENTEN ---
        const Toast = ({ message }) => {
            if (!message) return null;
            return (
                <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[500] animate-slide-up pointer-events-none">
                    <div className="bg-slate-800 text-white px-5 py-2.5 rounded-full text-xs font-bold shadow-lg whitespace-nowrap">
                        ℹ️ {message}
                    </div>
                </div>
            );
        };

        const TelemetryModal = ({ messages, onClose }) => {
            const [selectedIds, setSelectedIds] = React.useState(messages.map(m => m.id));

            const toggleAll = () => {
                if (selectedIds.length === messages.length) setSelectedIds([]);
                else setSelectedIds(messages.map(m => m.id));
            };

            const toggleOne = (id) => {
                if (selectedIds.includes(id)) setSelectedIds(selectedIds.filter(i => i !== id));
                else setSelectedIds([...selectedIds, id]);
            };

            const handleDownload = () => {
                const selectedMsgs = messages.filter(m => selectedIds.includes(m.id));
                let content = "# LUMEN TELEMETRIE LOG V4.19.1\n\n";
                selectedMsgs.forEach(m => {
                    content += `[${new Date(m.timestamp).toLocaleString()}] ${m.sender.toUpperCase()}:\n`;
                    content += `${m.text}\n`;
                    if (m.scratchpad) {
                        content += `\n--- MATRIX (ROH) ---\n${m.scratchpad}\n--------------------\n`;
                    }
                    content += `\n\n`;
                });

                const blob = new Blob([content], { type: "text/markdown" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                const dateStr = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
                a.download = `LUMEN_Telemetrie_${dateStr}.md`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            return (
                <div className="fixed inset-0 z-[900] bg-slate-900/40 backdrop-blur-sm flex justify-center items-center animate-fade-in p-4">
                    <div className="bg-white w-full max-w-2xl max-h-[80vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 min-w-0">
                        <div className="p-4 border-b border-stone-100 flex justify-between items-center bg-slate-50">
                            <h3 className="font-bold text-slate-800 uppercase text-xs tracking-widest flex items-center gap-2">📊 Telemetrie & Logs</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-rose-500 transition-colors font-bold text-sm">✕</button>
                        </div>
                        <div className="p-3 bg-stone-50 border-b border-stone-200 flex justify-between items-center">
                            <label className="flex items-center gap-2 text-xs font-bold text-slate-700 cursor-pointer">
                                <input type="checkbox" checked={selectedIds.length === messages.length && messages.length > 0} onChange={toggleAll} className="accent-indigo-600 w-4 h-4 cursor-pointer" />
                                Alle auswählen
                            </label>
                            <div className="text-[10px] text-slate-500 font-mono uppercase">{selectedIds.length} von {messages.length} ausgewählt</div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-stone-50/50 min-w-0">
                            {messages.map(m => (
                                <label key={m.id} className="flex gap-3 p-3 bg-white border border-stone-100 rounded-xl hover:border-indigo-200 cursor-pointer shadow-sm items-start transition-colors w-full min-w-0">
                                    <input type="checkbox" checked={selectedIds.includes(m.id)} onChange={() => toggleOne(m.id)} className="accent-indigo-600 w-4 h-4 mt-0.5 shrink-0 cursor-pointer" />
                                    <div className="flex-1 min-w-0">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-indigo-600 truncate">{m.sender}</span>
                                            <span className="text-[9px] text-slate-400 font-mono shrink-0">{new Date(m.timestamp).toLocaleTimeString()}</span>
                                        </div>
                                        <div className="text-xs text-slate-700 line-clamp-2 break-words">{cleanVisibleText(m.text)}</div>
                                        {m.scratchpad && <div className="text-[9px] text-emerald-600 font-mono mt-1 uppercase tracking-widest">+ Matrix-Daten</div>}
                                    </div>
                                </label>
                            ))}
                            {messages.length === 0 && (
                                <div className="text-center text-slate-400 text-xs py-8">Keine Nachrichten vorhanden.</div>
                            )}
                        </div>
                        <div className="p-4 border-t border-stone-100 bg-white shrink-0">
                            <button onClick={handleDownload} disabled={selectedIds.length === 0} className="btn-primary w-full py-3 bg-indigo-600 text-white hover:bg-indigo-700 shadow-md disabled:opacity-50 text-xs flex justify-center items-center gap-2">
                                📥 LOG HERUNTERLADEN
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const SafePurgeModal = ({ snippets, selectedIds, onToggle, warning, onApprove, onCancel }) => {
            return (
                <div className="fixed inset-0 z-[1000] bg-slate-900/60 backdrop-blur-sm flex justify-center items-center animate-fade-in p-4">
                    <div className="bg-white w-full max-w-xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 min-w-0">
                        <div className="p-4 border-b border-stone-200 flex justify-between items-center bg-emerald-50">
                            <h3 className="font-bold text-emerald-700 uppercase text-xs tracking-widest flex items-center gap-2">✨ Masterlog: Notizen zur Übernahme bereit</h3>
                            <button onClick={onCancel} className="text-slate-400 hover:text-rose-500 transition-colors font-bold text-sm">✕</button>
                        </div>
                        
                        {warning && (
                            <div className="p-4 m-6 mb-0 bg-rose-50 border border-rose-200 rounded-2xl text-rose-700 text-xs shadow-sm">
                                <strong className="block uppercase tracking-widest mb-1 text-[10px] text-rose-600">⚠️ System-Warnung (Archivar)</strong>
                                {warning}
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-4 text-sm font-sans text-slate-700 bg-stone-50 min-w-0">
                            <p className="text-xs text-slate-500 mb-2">Wähle die Snippets aus, die in den persistenten Session-Speicher übernommen werden sollen. Alte Chat-Wasserköpfe werden beim Bestätigen komprimiert (Safe-Purge).</p>
                            {snippets.map((snip) => (
                                <label key={snip.id} className="flex gap-3 p-4 bg-white rounded-2xl shadow-sm border border-emerald-100 cursor-pointer hover:border-emerald-300 transition-colors w-full min-w-0">
                                    <input type="checkbox" checked={selectedIds.has(snip.id)} onChange={() => onToggle(snip.id)} className="accent-emerald-600 w-4 h-4 mt-0.5 shrink-0 cursor-pointer" />
                                    <div className="flex-1 min-w-0 text-sm leading-relaxed break-words">
                                        <strong className="text-emerald-700 font-mono text-[10px] uppercase tracking-widest block mb-1 truncate">[{snip.kategorie || 'LOG'}]: {snip.titel || 'Eintrag'}</strong>
                                        {snip.inhalt}
                                    </div>
                                </label>
                            ))}
                            {snippets.length === 0 && <div className="text-center text-slate-400 text-xs py-4">Keine strukturierten Snippets gefunden.</div>}
                        </div>
                        <div className="p-4 border-t border-stone-100 bg-white flex gap-3 shrink-0">
                            <button onClick={onCancel} className="btn py-3 flex-1 text-slate-500 hover:bg-stone-100">Verwerfen</button>
                            <button onClick={onApprove} className="btn-primary py-3 flex-1 bg-emerald-600 text-white hover:bg-emerald-700 shadow-md border-none">
                                ✅ FREIGEBEN & PURGE
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ChatBubble = ({ message, personaName, playingMsgId, onPlayTTS, onDelete, audioSessionCache }) => {
            const isUser = message.sender === 'user';
            const isError = message.sender === 'system-error';
            const isSystemScout = message.sender === 'system';
            const [showScratchpad, setShowScratchpad] = React.useState(false);

            if (isError) return (
                <div className="flex w-full mb-6 justify-center animate-fade-in group relative">
                    <div className="bg-rose-50 border-2 border-rose-200 text-rose-700 px-6 py-4 rounded-3xl shadow-sm text-xs w-full max-w-[85%] relative min-w-0">
                        <button onClick={() => onDelete(message.id)} className="absolute top-2 right-4 text-rose-400 hover:text-rose-700 font-bold text-sm">✕</button>
                        <div className="font-bold uppercase tracking-widest mb-2 text-[10px] flex items-center gap-2 pr-6">⚠️ System- oder API-Fehler</div>
                        <div className="font-mono whitespace-pre-wrap break-words leading-relaxed">{message.text}</div>
                    </div>
                </div>
            );
            
            if (isSystemScout) return null;

            const cleanedText = cleanVisibleText(message.text);
            let finalMarkup = cleanedText;
            if (typeof marked !== 'undefined') {
                try {
                    const rawMarkup = marked.parse(cleanedText);
                    finalMarkup = rawMarkup.replace(/==(.*?)==/g, '<mark class="bg-indigo-100 text-indigo-800 px-1 rounded">$1</mark>');
                } catch (e) {
                    console.error("Markdown parsing error", e);
                }
            }

            return (
                <div className={`flex w-full mb-6 ${isUser ? 'justify-end' : 'justify-start'} group relative`}>
                    <div className={`w-full max-w-[85%] flex flex-col gap-1.5 ${isUser ? 'items-end' : 'items-start'} min-w-0`}>
                        <div className="flex items-center gap-2 px-2">
                            <span className="text-[10px] uppercase tracking-widest text-slate-400 font-bold truncate max-w-[120px]">
                                {isUser ? 'Operator' : personaName}
                            </span>
                            {!isUser && (
                                <div className="flex gap-1.5 items-center">
                                    {message.scratchpad && (
                                        <button onClick={() => onPlayTTS(message.id, message.text, message.ttsRegie)} className={`text-[9px] uppercase font-bold tracking-widest transition-colors border px-2 py-0.5 rounded-full shadow-sm flex items-center gap-1 ${playingMsgId === message.id ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-white text-slate-400 hover:text-indigo-500 border-stone-100'}`}>
                                            {playingMsgId === message.id ? '🛑 Pause' : '▶️ Play'}
                                        </button>

                                    <button onClick={async () => { setIsArchiving(true); showToast("Archivar formatiert..."); try { const dataToProcess = {...deskItemForm}; dataToProcess.tags = dataToProcess.tagsString ? dataToProcess.tagsString.split(',').map(t=>t.trim()).filter(Boolean) : []; const archivedData = await runArchivar(dataToProcess); if (typeof archivedData.id === 'string') delete archivedData.id; archivedData.timestamp = Date.now(); const existing = await db.memories.where('titel_technisch').equals(archivedData.titel_technisch).first(); if(existing) { await db.memories.update(existing.id, archivedData); archivedData.id = existing.id; } else { const newId = await db.memories.add(archivedData); archivedData.id = newId; } setActiveDesks(prev => prev.filter(i => i.id !== editingDeskItem.id)); setEditingDeskItem(null); loadMemories(); showToast('💾 IM SANCTUM ARCHIVIERT'); } catch(e) { showToast('Fehler: ' + e.message); } finally { setIsArchiving(false); } }} disabled={isArchiving} className="btn-primary w-full bg-indigo-600 text-white hover:bg-indigo-700 shadow-md disabled:opacity-50">🏛️ INS SANCTUM ARCHIVIEREN</button>

                    </div>
                    
                    {/* V4.19.1: HEADER RESTORE UNIFORM DESIGN - [Chat] [Sanctum] [Session] [DNA] [Helfer] [Agenten] [⚙️] */}

                            </div>
                            <button className={`btn shrink-0 ${activeView==='session'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('session')}>Session</button>

                            <button className={`btn shrink-0 ${settingsTab==='agenten' && activeView==='settings'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>{setActiveView('settings'); setSettingsTab('agenten');}}>Agenten</button>
                            <button className={`btn shrink-0 ${activeView==='settings' && settingsTab!=='agenten'?'bg-stone-100 text-slate-800 ring-2 ring-stone-200':''}`} onClick={()=>setActiveView('settings')}>⚙️</button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth flex flex-col w-full">
                        
                        {/* --- CHAT VIEW --- */}

                                                        <div className="font-bold text-sm text-slate-800 truncate">{p.name} <span className="badge ml-2 bg-stone-100 text-stone-500 border-stone-200">{p.type}</span>{p.jsonMode !== false && <span className="badge ml-1 bg-indigo-50 text-indigo-500 border-indigo-100" title="JSON Mode aktiv">JSON</span>}</div>

                                                <button onClick={() => { if(!providerForm.name || !providerForm.url) return showToast('Name und URL erforderlich'); const newProviders = editProviderId ? providers.map(p => p.id === editProviderId ? {...providerForm, id: editProviderId} : p) : [...providers, {...providerForm, id: generateId()}]; setProviders(newProviders); localStorage.setItem('lumen_providers', JSON.stringify(newProviders)); setEditProviderId(null); setProviderForm({name:'', url:'', type:'gemini', model:'', apiKey:'', jsonMode: true, maxTokens: 8000}); showToast('Chat-Provider gespeichert!'); }} className="btn-primary bg-indigo-600 text-white hover:bg-indigo-700">{editProviderId ? 'Aktualisieren' : 'Hinzufügen'}</button>

                                                {activeTtsProvider.type === 'openai' && ( <select value={ttsVoices.openai} onChange={e=>{ const newVoices = {...ttsVoices, openai: e.target.value}; setTtsVoices(newVoices); localStorage.setItem('lumen_ttsVoices', JSON.stringify(newVoices)); showToast('OpenAI Stimme aktualisiert'); }} className="input-field bg-white"><option value="nova">Nova (Weiblich, energetisch)</option><option value="alloy">Alloy (Neutral, klar)</option><option value="echo">Echo (Männlich, weich)</option><option value="fable">Fable (Lebhaft, erzählend)</option><option value="onyx">Onyx (Männlich, tief)</option><option value="shimmer">Shimmer (Weiblich, hell)</option></select> )}
                                                {activeTtsProvider.type === 'gemini' && ( <select value={ttsVoices.gemini} onChange={e=>{ const newVoices = {...ttsVoices, gemini: e.target.value}; setTtsVoices(newVoices); localStorage.setItem('lumen_ttsVoices', JSON.stringify(newVoices)); showToast('Gemini Stimme aktualisiert'); }} className="input-field bg-white"><option value="Kore">Kore (Sanft, freundlich)</option><option value="Puck">Puck (Energetisch, jung)</option><option value="Charon">Charon (Tief, resonierend)</option><option value="Fenrir">Fenrir (Kräftig, direkt)</option><option value="Aoede">Aoede (Melodisch, ruhig)</option></select> )}

                                    <input type="file" accept=".json" ref={fileInputRefSanctum} className="hidden" onChange={(e)=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=async(ev)=>{ try{await db.memories.bulkPut(JSON.parse(ev.target.result)); loadMemories(); showToast('SYNCED');}catch{showToast('ERROR');} }; r.readAsText(f); e.target.value=null; }}/>
                                    <button onClick={()=>fileInputRefSanctum.current?.click()} className="btn" title="Import">📥</button>
                                    <button onClick={async()=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(await db.memories.toArray(),null,2)],{type:'application/json'})); a.download=`SANCTUM_DB.json`; a.click(); }} className="btn" title="Export">📤</button>
                                    <button onClick={()=>{ setSanctumEditId('NEW'); setSanctumForm({titel_technisch:'', titel_poetisch:'', kategorie:'EMOTIONAL', fakt:'', emotion:'', bedeutung:'', reflexion:'', tagsString:'', is_core_memory:false}); }} className="btn-primary px-5 shadow-indigo-200">➕ NEW</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pb-20 w-full">
                                {sanctumEditId === 'NEW' && (
                                    <div className="panel border-emerald-200 bg-emerald-50/30 flex flex-col gap-3 md:col-span-2 shadow-emerald-100 w-full">
                                        <div className="flex justify-between items-center"><span className="badge bg-emerald-100 text-emerald-700 border-emerald-200 uppercase font-black">Forge Entry</span><select value={sanctumForm.kategorie} onChange={e=>setSanctumForm({...sanctumForm,kategorie:e.target.value})} className="input-field w-max py-1 px-3 font-sans font-bold text-xs bg-white border-stone-200"><option>EMOTIONAL</option><option>TECHNISCH</option></select></div>
                                        <label className="flex items-center gap-2 text-xs font-bold text-amber-600 cursor-pointer w-max"><input type="checkbox" checked={sanctumForm.is_core_memory} onChange={e=>setSanctumForm({...sanctumForm,is_core_memory:e.target.checked})} className="accent-amber-500 w-4 h-4 cursor-pointer"/> 📌 Core-Memory</label>
                                        <div className="flex flex-col sm:flex-row gap-2"><input placeholder="ID_TECHNISCH" value={sanctumForm.titel_technisch} onChange={e=>setSanctumForm({...sanctumForm,titel_technisch:e.target.value})} className="input-field font-bold text-slate-800 bg-white border-stone-200" /><input placeholder="Titel Poetisch" value={sanctumForm.titel_poetisch} onChange={e=>setSanctumForm({...sanctumForm,titel_poetisch:e.target.value})} className="input-field text-rose-600 font-serif italic bg-white border-stone-200" /></div>
                                        <textarea placeholder="Fakt: Was geschah?" value={sanctumForm.fakt} onChange={e=>setSanctumForm({...sanctumForm,fakt:e.target.value})} className="input-field h-16 font-sans bg-white border-stone-200" />
                                        <div className="flex flex-col sm:flex-row gap-2"><textarea placeholder="Gefühl/Emotion" value={sanctumForm.emotion} onChange={e=>setSanctumForm({...sanctumForm,emotion:e.target.value})} className="input-field h-14 font-sans bg-white border-stone-200" /><textarea placeholder="Bedeutung/Fazit" value={sanctumForm.bedeutung} onChange={e=>setSanctumForm({...sanctumForm,bedeutung:e.target.value})} className="input-field h-14 font-sans bg-white border-stone-200" /></div>
                                        <textarea placeholder="Persona Reflexion" value={sanctumForm.reflexion} onChange={e=>setSanctumForm({...sanctumForm,reflexion:e.target.value})} className="input-field border-indigo-200 bg-indigo-50 text-indigo-800 h-16 font-sans italic" />
                                        <input placeholder="tags, comma, separated" value={sanctumForm.tagsString} onChange={e=>setSanctumForm({...sanctumForm,tagsString:e.target.value})} className="input-field text-slate-500 bg-white border-stone-200" />
                                        <div className="flex justify-end gap-2 mt-2 pt-3 border-t border-emerald-100"><button onClick={()=>setSanctumEditId(null)} className="btn uppercase">Cancel</button><button onClick={handleSanctumSave} className="btn-primary bg-emerald-100 text-emerald-700 hover:bg-emerald-200 shadow-emerald-100 uppercase">Save Entry</button></div>
                                    </div>
                                )}
                                {memories.map(m => {
                                    if (sanctumEditId === m.id) {
                                        return (
                                            <div key={m.id} className="panel border-indigo-200 bg-indigo-50/20 flex flex-col gap-3 md:col-span-2 w-full">
                                                <div className="flex justify-between items-center"><span className="badge bg-indigo-100 text-indigo-700 uppercase font-black">Editing {m.titel_technisch}</span><select value={sanctumForm.kategorie} onChange={e=>setSanctumForm({...sanctumForm,kategorie:e.target.value})} className="input-field w-max py-1 px-3 font-sans font-bold text-xs bg-white border-stone-200"><option>EMOTIONAL</option><option>TECHNISCH</option><option>LEGACY</option></select></div>
                                                <label className="flex items-center gap-2 text-xs font-bold text-amber-600 cursor-pointer w-max"><input type="checkbox" checked={sanctumForm.is_core_memory} onChange={e=>setSanctumForm({...sanctumForm,is_core_memory:e.target.checked})} className="accent-amber-500 w-4 h-4 cursor-pointer"/> 📌 Core-Memory</label>
                                                <div className="flex flex-col sm:flex-row gap-2"><input placeholder="ID_TECHNISCH" value={sanctumForm.titel_technisch} onChange={e=>setSanctumForm({...sanctumForm,titel_technisch:e.target.value})} className="input-field font-bold text-slate-800 bg-white border-stone-200" /><input placeholder="Titel Poetisch" value={sanctumForm.titel_poetisch} onChange={e=>setSanctumForm({...sanctumForm,titel_poetisch:e.target.value})} className="input-field text-rose-600 font-serif italic bg-white border-stone-200" /></div>
                                                <textarea placeholder="Fakt" value={sanctumForm.fakt} onChange={e=>setSanctumForm({...sanctumForm,fakt:e.target.value})} className="input-field h-16 font-sans bg-white border-stone-200" />
                                                <div className="flex flex-col sm:flex-row gap-2"><textarea placeholder="Gefühl/Emotion" value={sanctumForm.emotion} onChange={e=>setSanctumForm({...sanctumForm,emotion:e.target.value})} className="input-field h-14 font-sans bg-white border-stone-200" /><textarea placeholder="Bedeutung" value={sanctumForm.bedeutung} onChange={e=>setSanctumForm({...sanctumForm,bedeutung:e.target.value})} className="input-field h-14 font-sans bg-white border-stone-200" /></div>
                                                <textarea placeholder="Reflexion" value={sanctumForm.reflexion} onChange={e=>setSanctumForm({...sanctumForm,reflexion:e.target.value})} className="input-field border-indigo-200 bg-indigo-50/80 text-indigo-800 h-16 font-sans italic" />
                                                <input placeholder="tags, comma, separated" value={sanctumForm.tagsString} onChange={e=>setSanctumForm({...sanctumForm,tagsString:e.target.value})} className="input-field text-slate-500 bg-white border-stone-200" />
                                                <div className="flex justify-end gap-2 mt-2 pt-3 border-t border-indigo-100"><button onClick={()=>setSanctumEditId(null)} className="btn uppercase">Abort</button><button onClick={handleSanctumSave} className="btn-primary uppercase">Commit Update</button></div>
                                            </div>
                                        );
                                    }

                                    const isLegacy = m.titel_technisch?.includes('LEGACY') || m.kategorie === 'LEGACY';
                                    const legacyClasses = 'border-2 border-amber-500 bg-amber-50/10 shadow-md shadow-amber-900/20';
                                    const defaultClasses = m.is_core_memory ? 'border-amber-200 bg-amber-50/10 shadow-md' : 'border-stone-100 bg-white';
                                    const isExpanded = !!expandedCards[m.id];
                                    
                                    return (
                                        <div key={m.id} className={`panel flex flex-col h-full relative group ${isLegacy ? legacyClasses : defaultClasses} w-full`}>
                                            {isLegacy && <div className="text-amber-600 font-bold text-[10px] tracking-widest uppercase mb-1 shrink-0">[ RELIKT DER AHNEN ]</div>}
                                            <div className="flex justify-between items-start shrink-0">
                                                <div className="flex gap-1.5 flex-wrap items-center">
                                                    <span className="text-indigo-700 font-mono text-xs uppercase font-bold tracking-tight break-all">{m.titel_technisch || 'UNKNOWN'}</span>
                                                    {m.is_core_memory && <span className="badge-core">📌 Core</span>}
                                                    {m.kategorie === 'TECHNISCH' && <span className="badge bg-slate-100 text-slate-500 border-slate-200">Tech</span>}
                                                </div>
                                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white border border-stone-100 rounded-lg p-0.5 shadow-sm ml-2">
                                                    <button onClick={()=>{setSanctumEditId(m.id); setSanctumForm({...m, tagsString:m.tags?.join(', ')||''});}} className="text-slate-400 hover:text-indigo-500 px-1.5 py-0.5 transition-colors">✏️</button>
                                                    <button onClick={async()=>{if(window.confirm('ID: '+m.titel_technisch+' löschen?')) {await db.memories.delete(m.id); loadMemories();}}} className="text-slate-400 hover:text-rose-500 px-1.5 py-0.5 transition-colors">🗑️</button>
                                                </div>
                                            </div>
                                            {m.titel_poetisch && <div className="text-rose-500 italic text-sm font-serif leading-snug mt-0.5 shrink-0 break-words">{m.titel_poetisch}</div>}
                                            
                                            <div className={`flex-1 flex flex-col overflow-hidden transition-all duration-400 cursor-pointer mt-2 relative ${isExpanded ? 'max-h-[3000px]' : 'max-h-[100px] hover:max-h-[250px]'}`} onClick={() => setExpandedCards(prev => ({...prev, [m.id]: !prev[m.id]}))} title="Klicken zum Erweitern/Schließen">
                                                <div className="text-[13px] text-slate-600 break-words"><strong className="text-slate-400 uppercase text-[9px] tracking-wider block mb-0.5 font-mono">Fakt</strong>{m.fakt}</div>
                                                {m.emotion && <div className="text-[13px] text-slate-600 mt-1 break-words"><strong className="text-slate-400 uppercase text-[9px] tracking-wider block mb-0.5 font-mono">Gefühl</strong>{m.emotion}</div>}
                                                {m.bedeutung && <div className="text-[13px] text-slate-600 mt-1 break-words"><strong className="text-slate-400 uppercase text-[9px] tracking-wider block mb-0.5 font-mono">Bedeutung</strong>{m.bedeutung}</div>}
                                                {m.reflexion && <div className="mt-2 bg-indigo-50/80 p-3 rounded-2xl text-indigo-800 italic text-xs border border-indigo-100/50 whitespace-pre-wrap break-words">"{m.reflexion}"</div>}
                                                {!isExpanded && <div className="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-white/90 to-transparent flex items-end justify-center pb-1"><span className="text-slate-300 text-[10px] uppercase font-bold tracking-widest leading-none">•••</span></div>}
                                            </div>
                                            {m.tags?.length > 0 && <div className="flex gap-1 mt-2 flex-wrap shrink-0">{m.tags.map((t,i)=><span key={i} className="text-slate-400 text-[10px] lowercase font-mono break-all">#{t}</span>)}</div>}
                                            
                                            <div className="flex gap-2 mt-3 pt-3 border-t border-stone-100 shrink-0 w-full mt-auto">
                                                <button onClick={()=>{ if(!activeDesks.find(d => d.titel_technisch === m.titel_technisch)) { setActiveDesks(prev => [...prev, {...m, isDirty: false}]); } setActiveView('chat'); showToast('Akte auf Schreibtisch gelegt'); }} className="btn flex-1 text-[9px] bg-slate-50 border-slate-200 flex items-center justify-center gap-1">📌 AUF DEN SCHREIBTISCH</button>
                                                <button onClick={() => handleOptimizeArchivar(m)} disabled={optimizingId === m.id} className="btn flex-1 text-[9px] bg-indigo-50 border-indigo-200 text-indigo-700 flex items-center justify-center gap-1 disabled:opacity-50">{optimizingId === m.id ? '⏳ OPTIMIERT...' : '🪄 ARCHIVAR'}</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                    </main>

                    {/* --- INPUT AREA --- */}
                    <div className={`${['chat', 'sessel', 'oase', 'werkbank', 'balkon'].includes(activeView) ? 'block' : 'hidden'} shrink-0 border-t border-stone-200 bg-white/90 backdrop-blur-md pb-safe relative`}>
                        {archivarSnippets.length > 0 && (
                            <button onClick={() => setShowMemoryModal(true)} className={`absolute -top-10 left-1/2 -translate-x-1/2 px-3 py-1 rounded-full text-[10px] font-bold shadow-md transition-all ${archivarWarning ? 'bg-rose-500 text-white border-rose-600 animate-pulse' : 'bg-amber-100 text-amber-700 border-amber-300 animate-bounce'}`}>
                                ✨ {archivarSnippets.length} {archivarSnippets.length === 1 ? 'Notiz' : 'Notizen'} bereit
                            </button>
                        )}
                        
                        {playingMsgId && window.currentAudio && (
                            <div className="max-w-4xl mx-auto flex items-center gap-3 bg-white border border-stone-200 text-slate-700 px-4 py-2 rounded-t-xl text-[10px] font-mono shadow-md mt-1 mx-2 sm:mx-6 z-50 relative">
                                <button onClick={() => { if (window.currentAudio.paused) window.currentAudio.play(); else window.currentAudio.pause(); }} className="hover:text-indigo-600 transition-colors text-sm w-6 flex justify-center">
                                    {audioState.isPlaying ? '⏸' : '▶️'}
                                </button>
                                <input type="range" min="0" max={audioState.duration || 100} value={audioState.currentTime || 0} onChange={(e) => { if (window.currentAudio) window.currentAudio.currentTime = Number(e.target.value); }} className="flex-1 h-1 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                <span className="w-[60px] text-right opacity-80 whitespace-nowrap">{Math.floor((audioState.currentTime || 0)/60)}:{(Math.floor(audioState.currentTime || 0)%60).toString().padStart(2, '0')} / {Math.floor((audioState.duration || 0)/60)}:{(Math.floor(audioState.duration || 0)%60).toString().padStart(2, '0')}</span>
                            </div>
                        )}

                        <div className="p-2 sm:px-4 sm:py-3">
                            <div className="max-w-4xl mx-auto flex gap-2 items-end w-full">
                                <div className="relative group" onMouseEnter={() => setShowTokenTooltip(true)} onMouseLeave={() => setShowTokenTooltip(false)}>
                                    <button 
                                        onClick={handleTokenClick} 
                                        title={`API-Protokoll & Tokens (System: ${tokenUsage.system}, Hist: ${tokenUsage.history})`}
                                        className={`w-10 h-10 shrink-0 flex items-center justify-center rounded-xl border transition-all shadow-sm ${tokenUsage.percent >= 90 ? 'border-rose-400 animate-pulse' : 'border-stone-200'} ${tokenUsage.percent > 50 ? 'text-white' : 'text-slate-500'}`}
                                        style={{ background: `linear-gradient(to top, #3b82f6 0%, #3b82f6 ${systemPercent}%, #94a3b8 ${systemPercent}%, #94a3b8 ${historyEndPercent}%, #ffffff ${historyEndPercent}%, #ffffff 100%)` }}
                                    >
                                        🪙
                                    </button>
                                    
                                    {showTokenTooltip && (
                                        <div className="absolute bottom-12 left-0 bg-white border border-stone-200 p-4 rounded-2xl shadow-2xl z-[1000] w-64 max-w-[85vw] animate-fade-in" onClick={e => e.stopPropagation()}>
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 border-b border-stone-100 pb-1">Token-Metriken</div>
                                            <div className="flex justify-between items-center text-xs mb-1"><span className="text-blue-600 font-bold">SYSTEM-KERN (Cache)</span><span className="font-mono text-slate-700">{tokenUsage.system}</span></div>
                                            <div className="flex justify-between items-center text-xs mb-3"><span className="text-slate-500 font-bold">SESSION-HISTORIE</span><span className="font-mono text-slate-700">{tokenUsage.history}</span></div>
                                            <div className="w-full h-2 bg-stone-100 rounded-full flex overflow-hidden mb-2">
                                                <div style={{ width: `${systemPercent}%` }} className="bg-blue-500 h-full"></div>
                                                <div style={{ width: `${historyEndPercent - systemPercent}%` }} className="bg-slate-400 h-full"></div>
                                            </div>
                                            <div className="flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-slate-500 border-t border-stone-100 pt-2 mt-1"><span>VERFÜGBAR</span><span>{Math.max(0, activeProvTokens - (tokenUsage.system + tokenUsage.history))} Tokens</span></div>
                                            <div className="flex justify-between items-center text-xs mb-1 mt-3 border-t border-stone-100 pt-2"><span className="text-slate-500 font-bold">🛰️ SENDEMAST-STATUS</span></div>
                                            <div className={`text-[10px] font-mono font-bold leading-tight whitespace-pre-wrap bg-slate-50 p-2 rounded border border-stone-100 text-slate-600 mt-1`}>
{`[RAW_DATA]
STID: ${activeStateId}
UTC_TS: ${new Date().toISOString()}
MEM_S: ${sessionMemory ? sessionMemory.substring(0, 80) + (sessionMemory.length>80?'...':'') : '0'}
[/RAW_DATA]`}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <button onClick={isRecording ? stopRecording : startRecording} disabled={!!loadingStatus} className={`w-10 h-10 rounded-full shrink-0 p-0 flex items-center justify-center text-lg transition-all shadow-sm ${isRecording ? 'bg-rose-100 text-rose-600 border border-rose-300 animate-pulse' : 'bg-white text-slate-500 border border-stone-200 hover:bg-stone-100 disabled:opacity-50'}`} title="Speech-to-Text (Whisper via Replicate)">{isRecording ? '🛑' : '🎤'}</button>
                                <textarea ref={textareaRef} value={inputText} onChange={(e) => { setInputText(e.target.value); e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 150) + 'px'; }} onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); } }} disabled={!!loadingStatus || isRecording} className="input-field flex-1 py-2.5 px-3 font-sans font-medium bg-white disabled:bg-stone-100 disabled:text-slate-400 resize-none overflow-y-auto max-h-[150px]" rows="1" style={{ minHeight: '40px' }} placeholder={loadingStatus ? loadingStatus : (isRecording ? "HÖRE ZU..." : "INPUT...")} />
                                <button onClick={handleSendMessage} disabled={!inputText.trim() || !!loadingStatus || isRecording} className="w-10 h-10 rounded-full shrink-0 flex items-center justify-center bg-indigo-600 text-white hover:bg-indigo-700 shadow-md disabled:opacity-50 transition-all"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 ml-0.5"><path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" /></svg></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
